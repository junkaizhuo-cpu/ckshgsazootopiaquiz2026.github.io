<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 建功人請回答！！畢業限定心理測驗</title>
    <style>
        :root {
            --primary-color: #4a5568;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --sticker-color: #cbd5e0;
        }
        
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: #2d3748;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
            border: 1px solid #e5e7eb;
        }

        h1 {
            color: #1a202c;
            font-size: 26px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #718096;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: justify;
            padding: 0 10px;
        }

        .hidden {
            display: none !important;
        }

        /* ─── 圖片外框顯示區域 ─── */
        .image-box {
            width: 100%;
            height: 250px;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓圖片完美填滿框框不變形 */
        }

        /* ─── 擬真貼紙排版區域 ─── */
        .identity-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin: 25px 0 15px 0;
            padding: 20px;
            background: #fafafa;
            border-radius: 16px;
            border: 2px dashed #e2e8f0;
        }

        .sticker-btn {
            padding: 14px 24px;
            border: 2px solid #ffffff;
            border-radius: 8px;
            font-weight: 800;
            font-size: 15.5px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
            letter-spacing: 0.5px;
            position: relative;
        }

        .silver { 
            background: linear-gradient(135deg, #e2e8f0, #cbd5e0); 
            color: #4a5568; 
            transform: rotate(-3deg);
            box-shadow: 2px 3px 0px #94a3b8, 4px 6px 10px rgba(0,0,0,0.08);
        }
        .gold { 
            background: linear-gradient(135deg, #fee2e2, #fef08a); 
            color: #713f12; 
            transform: rotate(2deg);
            box-shadow: -2px 3px 0px #ca8a04, -4px 6px 10px rgba(0,0,0,0.08);
        }
        .purple { 
            background: linear-gradient(135deg, #e0f2fe, #e9d5ff); 
            color: #5b21b6; 
            transform: rotate(-1.5deg);
            box-shadow: 3px 2px 0px #7c3aed, 5px 5px 10px rgba(0,0,0,0.08);
        }

        .sticker-btn:hover {
            transform: scale(1.05) rotate(0deg);
            box-shadow: 0 8px 16px rgba(0,0,0,0.12);
            z-index: 10;
        }

        #quiz-page {
            padding: 10px 0;
        }

        .question-title {
            font-size: 20px;
            font-weight: bold;
            margin-top: 5px;
            margin-bottom: 25px;
            color: #1f2937;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .option-btn {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            padding: 18px 20px;
            border-radius: 12px;
            text-align: left;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .option-btn:hover {
            background: #f3f4f6;
            border-color: #cbd5e0;
        }

        .option-btn.selected::after {
            content: '✓ 已貼上';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--sticker-color);
            color: var(--sticker-text, #fff);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            animation: stamp 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes stamp {
            0% { transform: translateY(-50%) scale(2.5); opacity: 0; }
            100% { transform: translateY(-50%) scale(1); opacity: 1; }
        }

        /* 人物檔案風格卡片 */
        .profile-card {
            background: #ffffff;
            border: 2px solid #1e293b;
            border-radius: 14px;
            padding: 25px;
            margin-top: 15px;
            text-align: left;
            position: relative;
            box-shadow: 5px 5px 0px #1e293b;
            animation: fadeIn 0.4s ease-out;
        }

        .profile-header {
            border-bottom: 2px dashed #cbd5e1;
            padding-bottom: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-title-area {
            flex: 1;
        }

        /* 自訂匯入的角色大頭貼樣式 */
        .profile-avatar-box {
            width: 85px;
            height: 85px;
            border-radius: 12px;
            border: 2px solid #1e293b;
            overflow: hidden;
            background: #f1f5f9;
            margin-left: 15px;
            flex-shrink: 0;
            box-shadow: 2px 2px 0px #1e293b;
        }

        .profile-avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-badge {
            font-size: 12px;
            background: #1e293b;
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 8px;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
            margin: 0;
        }

        .profile-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 13.5px;
            background: #f8fafc;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .meta-item { line-height: 1.5; }
        .meta-label { font-weight: bold; color: #64748b; }
        .meta-val { color: #334155; font-weight: 600; }

        .profile-body {
            font-size: 15px;
            line-height: 1.7;
            color: #334155;
            text-align: justify;
        }

        .profile-quote {
            background: #f1f5f9;
            border-left: 4px solid #475569;
            padding: 12px 18px;
            font-style: italic;
            font-weight: 600;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 15px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .trait-tag {
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            border: 1px solid #1e293b;
        }

        .restart-btn {
            background: #1e293b;
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }

        .restart-btn:hover { background: #0f172a; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: 35px;
            font-size: 11.5px;
            color: #94a3b8;
            line-height: 1.6;
        }
    </style>
    
    <script>
        // ─── 圖片載入防呆管理引擎 ───
        const ImageEngine = {
            // 切換題目圖（修正為優先載入自訂的 .png 檔案）
            setQuestionImage: function(index) {
                const imgTag = document.getElementById('quiz-img');
                if(!imgTag) return;
                const qNum = index + 1;
                
                // 優先使用自訂的 png 檔
                imgTag.src = `問題${qNum}.png`;
                
                // 如果 png 載入失敗，依序找 jpeg 和 jpg 做為後備
                imgTag.onerror = function() {
                    this.onerror = function() {
                        this.onerror = function() { this.src = ''; };
                        this.src = `問題${qNum}.jpg`;
                    };
                    this.src = `問題${qNum}.jpeg`;
                };
            },

            // 載入首頁主視覺圖（維持原本的 jpeg 優先）
            setWelcomeImage: function() {
                const imgTag = document.getElementById('welcome-img');
                if(!imgTag) return;
                imgTag.src = '主視覺.jpeg';
                imgTag.onerror = function() {
                    this.onerror = function() { this.src = '主視覺.png'; };
                    this.src = '主視覺.jpg';
                };
            }
        };

        window.jgQuiz = {
            currentQuestionIndex: 0,
            selectedScores: [],
            
            questions: [
                {
                    title: "明天要考試，今天晚上我會選擇...",
                    options: [
                        { text: "#想辦法捲死同學", score: "A" },
                        { text: "#與周公約會", score: "B" }
                    ]
                },
                {
                    title: "考前我更願意相信...",
                    options: [
                        { text: "#自己的智商", score: "C" },
                        { text: "#神明一定會幫助我的", score: "D" }
                    ]
                },
                {
                    title: "關於上學...",
                    options: [
                        { text: "#上課有認真聽", score: "C" },
                        { text: "#有來學校就很棒了", score: "B" }
                    ]
                },
                {
                    title: "下課時和好朋友兩個人在窗邊...",
                    options: [
                        { text: "#高山流水遇知音", score: "A" },
                        { text: "#低山臭水遇噪音", score: "D" }
                    ]
                },
                {
                    title: "面對未來的困難...",
                    options: [
                        { text: "#放馬過來", score: "A" },
                        { text: "#放我一馬", score: "D" }
                    ]
                }
            ],

            results: {
                "A": {
                    badge: "2026 頂峰執行者檔案",
                    name: "蠻牛局長 × 風紀股長",
                    characterName: "蠻牛局長",
                    bg: "#fee2e2",
                    meta: { code: "BOGO-BOSS-01", danger: "98% (極度危險)", place: "高三衝刺K書中心 / 糾察哨口", type: "鐵血行動派" },
                    traits: ["#放馬過來", "#想辦法捲死同學", "#氣場兩米八", "#高山流水遇知音"],
                    desc: "你就是那個面對未知挑戰敢正面大喊「放馬過來」的絕對強者！在學校裡遇到競爭會瞬間激發滿滿的戰鬥力，實力上演捲死同學的戲碼。你目標明確、效率極高，擁有不可動搖的霸氣。畢業後絕對是社會上打破常規、開疆闢土的開路先鋒！",
                    quote: "別擋路，我的目標只有頂峰。"
                },
                "B": {
                    badge: "2026 活力夢想家檔案",
                    name: "兔子茱蒂 × 體育股長",
                    characterName: "兔子茱蒂",
                    bg: "#fef9c3",
                    meta: { code: "JUDY-SPORTS-26", danger: "15% (人畜無害)", place: "操場跑道 / 體育器材室", type: "佛系熱血派" },
                    traits: ["#有來學校就很棒了", "#與周公約會", "#熱血滿點", "#元氣輸出"],
                    desc: "你抱持著「有來學校就很棒了」的樂活達人態度，雖然昨晚可能還在跟周公進行深度約會，但點燃熱情的速度比誰都快！看似無害其實內心生命力爆棚。只要運動會或活動號角響起，你就是全班的動能核心！",
                    quote: "生活要懂得放鬆，但好玩的事情我絕不缺席！"
                },
                "C": {
                    badge: "2026 智商天花板檔案",
                    name: "狐狸尼克 × 副班長",
                    characterName: "狐狸尼克",
                    bg: "#fae8ff",
                    meta: { code: "NICK-VICE-99", danger: "65% (智商壓制)", place: "後排靠窗座位 / 考前被包圍的課桌", type: "從容智謀派" },
                    traits: ["#自己的智商", "#上課有認真聽", "#智商擔當", "#優雅省力"],
                    desc: "考前你絕對敢大膽貼上「相信自己智商」的標籤，因為你上課其實都有默默抓到核心重點，骨子裡自帶一種看透局勢的淡定。聰明、帶點讓人又愛又恨的小傲嬌，平時低調看戲、優雅省力，但大局需要時總能用高智商精準掌控，是班上的隱藏版大佬。",
                    quote: "實力擺在那裡，穩紮穩打才是最高級的優雅。"
                },
                "D": {
                    badge: "2026 校園守護神檔案",
                    name: "樹懶快俠 × 普通學生",
                    characterName: "樹懶快俠",
                    bg: "#dcfce7",
                    meta: { code: "FLASH-STUDENT-00", danger: "0% (療癒爆表)", place: "教室最後一排 / 合作社榕樹下", type: "療癒避風港" },
                    traits: ["#放我一馬", "#神明一定會幫助我的", "#低山臭水遇噪音", "#慢條斯理"],
                    desc: "面對壓力重重的日常，你只想高喊「放我一馬」，考前默默祈禱神明加持。你不追求職位的虛名，只想當個與世無爭、置身事外的普通學生。即使身邊的人際關係像噪音一樣煩人，你也總能用強大的冷幽默和獨特的慢節奏將其化解，活得悠閒又療癒。",
                    quote: "沒事沒事，平安畢業，順其自然。"
                }
            },

            selectIdentity: function(type) {
                const root = document.documentElement;
                let textColor = '#fff';
                
                if (type === 'silver') { root.style.setProperty('--sticker-color', '#cbd5e0'); textColor = '#4a5568'; }
                else if (type === 'gold') { root.style.setProperty('--sticker-color', '#ecc94b'); textColor = '#744210'; }
                else if (type === 'purple') { root.style.setProperty('--sticker-color', '#9f7aea'); textColor = '#ffffff'; }
                
                root.style.setProperty('--sticker-text', textColor);

                document.getElementById('start-page').className = 'hidden';
                document.getElementById('quiz-page').className = '';
                this.showQuestion();
            },

            showQuestion: function() {
                if (this.currentQuestionIndex >= this.questions.length) {
                    this.showResult();
                    return;
                }

                const q = this.questions[this.currentQuestionIndex];
                document.getElementById('progress').innerText = `QUESTION ${this.currentQuestionIndex + 1} / ${this.questions.length}`;
                document.getElementById('question-text').innerText = q.title;
                
                // 動態更換題目圖片
                ImageEngine.setQuestionImage(this.currentQuestionIndex);

                const optionsBox = document.getElementById('options-box');
                optionsBox.innerHTML = '';

                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt.text;
                    btn.onclick = () => this.selectOption(btn, opt.score);
                    optionsBox.appendChild(btn);
                });
            },

            selectOption: function(element, score) {
                element.classList.add('selected');
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b => b.style.pointerEvents = 'none');

                this.selectedScores.push(score);
                this.currentQuestionIndex++;

                setTimeout(() => {
                    this.showQuestion();
                }, 400); 
            },

            showResult: function() {
                document.getElementById('quiz-page').className = 'hidden';
                document.getElementById('result-page').className = '';

                const counts = {};
                let maxScore = "B";
                let maxCount = 0;

                this.selectedScores.forEach(score => {
                    counts[score] = (counts[score] || 0) + 1;
                    if (counts[score] > maxCount) {
                        maxCount = counts[score];
                        maxScore = score;
                    }
                });

                const finalResult = this.results[maxScore];
                const cardBox = document.getElementById('profile-card-box');
                
                let traitHtml = '';
                finalResult.traits.forEach(t => {
                    traitHtml += `<span class="trait-tag" style="background:${finalResult.bg}">${t}</span>`;
                });

                cardBox.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-title-area">
                            <span class="profile-badge">${finalResult.badge}</span>
                            <h2 class="profile-name">${finalResult.name}</h2>
                        </div>
                        <div class="profile-avatar-box">
                            <img src="${finalResult.characterName}.jpeg" onerror="this.onerror=null; this.src='${finalResult.characterName}.jpg'; this.onerror=function(){this.src='${finalResult.characterName}.png';};" alt="${finalResult.name}">
                        </div>
                    </div>
                    <div class="profile-meta">
                        <div class="meta-item"><span class="meta-label">安全編號：</span><span class="meta-val">${finalResult.meta.code}</span></div>
                        <div class="meta-item"><span class="meta-label">特質歸屬：</span><span class="meta-val">${finalResult.meta.type}</span></div>
                        <div class="meta-item"><span class="meta-label">危險系數：</span><span class="meta-val">${finalResult.meta.danger}</span></div>
                        <div class="meta-item"><span class="meta-label">主要出沒：</span><span class="meta-val">${finalResult.meta.place}</span></div>
                    </div>
                    <div class="profile-body">
                        ${finalResult.desc}
                    </div>
                    <div class="profile-quote">
                        「${finalResult.quote}」
                    </div>
                    <div style="font-size:12px; font-weight:bold; color:#64748b; margin-top:15px; margin-bottom:5px;">▸ 偵測解鎖貼紙標籤：</div>
                    <div class="tags-container">
                        ${traitHtml}
                    </div>
                `;
            },

            resetQuiz: function() {
                this.currentQuestionIndex = 0;
                this.selectedScores = [];
                document.getElementById('result-page').className = 'hidden';
                document.getElementById('quiz-page').className = 'hidden';
                document.getElementById('start-page').className = '';
                ImageEngine.setWelcomeImage();
            }
        };

        window.onload = function() {
            ImageEngine.setWelcomeImage();
        };
    </script>
</head>
<body>

<div class="container">
    <div id="start-page">
        <h1>2026 建功人請回答！！</h1>
        <div class="image-box">
            <img id="welcome-img" src="主視覺.jpeg" alt="建功心測主視覺">
        </div>
        <p class="subtitle">
            這個測驗是畢聯會為建功人設計的，準備好迎接即將到來的畢業典禮嗎！快來看看你在建功動物城是什麼角色吧！希望大家可以透過一些小問題面對更真實的自己~~
        </p>
        <p style="font-size: 15px; font-weight: bold; color: #334155; margin-bottom: 5px;">撕下一張你的專屬貼紙身分：</p>
        
        <div class="identity-container">
            <button class="sticker-btn silver" onclick="window.jgQuiz.selectIdentity('silver')">國中生</button>
            <button class="sticker-btn gold" onclick="window.jgQuiz.selectIdentity('gold')">高中生</button>
            <button class="sticker-btn purple" onclick="window.jgQuiz.selectIdentity('purple')">家長及外賓</button>
        </div>
    </div>

    <div id="quiz-page" class="hidden">
        <div id="progress" style="font-size: 13px; color: #94a3b8; font-weight: bold; margin-bottom: 15px; text-align: left; letter-spacing: 0.5px;"></div>
        <div class="image-box">
            <img id="quiz-img" src="" alt="問題插圖">
        </div>
        <div class="question-title" id="question-text"></div>
        <div class="options-container" id="options-box"></div>
    </div>

    <div id="result-page" class="hidden">
        <div style="font-size: 14px; font-weight: bold; color: #64748b; margin-bottom: 8px; text-align: left;">▸ 畢聯會大數據精密 analysis：</div>
        <div class="profile-card" id="profile-card-box"></div>
        <button class="restart-btn" onclick="window.jgQuiz.resetQuiz()">重新建檔 / 再測一次</button>
    </div>

    <footer>
        新竹市立建功高級中學 X 2026建功畢聯會<br>
        Hsinchu Municipal Chien Kung Senior High School
    </footer>
</div>

</body>
</html>
