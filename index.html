<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zootopia 心靈鑑定特區 | 你是哪種動物？</title>
    <style>
        /* ==============================
           🎨 移動優先與自定義背景 (Mobile-First)
           ============================== */
        :root {
            --color-primary: #3498db; /* 哈茱蒂藍 */
            --color-secondary: #e67e22; /* 胡尼克橘 */
            --color-text: #333;
            --color-bg: #f4f7f6;
            --transition-speed: 0.4s;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--color-bg);
            color: var(--color-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* 防止橫向捲動 */
        }

        /* 🖼️ 【請在此處放入你的自定義背景圖網址】 */
        #quiz-container {
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), 
                              url('👉【你的背景圖網址】👈'); 
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* 頁面切換動畫 */
        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 40px;
            text-align: center;
        }
        .page.active { display: flex; animation: fadeIn var(--transition-speed) ease-in-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==============================
           🌇 [首頁] 歡迎區塊 
           ============================== */
        #page-0 .site-logo { font-size: 4rem; font-weight: 900; color: var(--color-accent); margin: 0; }
        #page-0 .site-subtitle { font-size: 1.5rem; color: #f1c40f; margin-bottom: 30px; }
        
        /* 🖼️ 【請在此處放入你的首頁大圖網址，例如：茱蒂或尼克】 */
        .character-visual {
            width: 300px; height: 300px;
            background-image: url('👉【你的首頁大圖網址】👈');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            margin-bottom: 50px;
        }

        .start-btn {
            padding: 20px 60px;
            font-size: 1.5rem; font-weight: bold;
            color: white;
            background: linear-gradient(45deg, var(--color-primary), #2980b9);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
            transition: all 0.3s ease;
        }
        .start-btn:hover { transform: scale(1.05) translateY(-2px); }

        /* ==============================
           🖋️ [題目區] 各個題目頁面 
           ============================== */
        .question-title {
            font-weight: bold; font-size: 1.8rem;
            color: var(--color-accent);
            margin-bottom: 40px;
            border-bottom: 4px solid var(--color-primary);
            display: inline-block;
        }

        /* 🖼️ 【這裡為每一題都預留了放圖的位置】 */
        .question-img {
            width: 100%; max-width: 400px;
            height: 250px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            margin-bottom: 40px;
        }

        /* 選項按鈕樣式 */
        .option-btn {
            display: block;
            width: 100%; max-width: 400px;
            padding: 20px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: white;
            background-color: rgba(44, 62, 80, 0.9);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .option-btn:hover { background-color: rgba(52, 152, 219, 1); transform: scale(1.02); }

        /* ==============================
           🏆 [結果顯示區] 
           ============================== */
        #result-section {
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 40px;
        }

        /* 🖼️ 【這裡是最後生成動物圖的大圖片區域】 */
        #result-img {
            width: 100%; max-width: 500px;
            height: 400px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            margin-bottom: 30px;
        }

        .result-title {
            font-size: 3rem;
            color: var(--color-secondary);
            margin-bottom: 25px;
            font-weight: 900;
        }
        .result-desc {
            font-size: 1.2rem;
            color: #555;
            text-align: left;
            background: rgba(255,255,255,0.9);
            padding: 25px;
            border-left: 6px solid var(--color-secondary);
            border-radius: 4px;
            margin-bottom: 35px;
            max-width: 500px;
        }
        .retry-btn {
            padding: 12px 30px;
            background-color: #95a5a6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="quiz-container">

    <div id="page-0" class="page active">
        <div class="site-logo">ZOOTOPIA</div>
        <div class="site-subtitle">心靈本性鑑定特區</div>
        
        <div class="character-visual"></div>

        <button class="start-btn" onclick="nextPage(1)">開始鑑定</button>
    </div>

    <div id="page-1" class="page">

        <div class="question-img" style="background-image: url('👉【請在代碼中貼入你處理好的圖片網址，或留空】👈');"></div>
        
        <p style="font-size: 1.3rem; margin-bottom: 30px;">終於到了週末，你通常會如何安排你的休息時間？</p>
        <button class="option-btn" onclick="selectAnswer('A')">A. 安排滿滿計畫！戶外運動、探索新地點。</button>
        <button class="option-btn" onclick="selectAnswer('B')">B. 在街頭閒晃，發掘有趣事物與隱藏美食。</button>
        <button class="option-btn" onclick="selectAnswer('C')">C. 待在舒適室內，準備零食，追愛豆或影集。</button>
        <button class="option-btn" onclick="selectAnswer('D')">D. 處理未完成事項，整理房間，保持井然有序。</button>
    </div>

    <div id="result-section" class="fade-in">
        <div style="font-size: 1.5rem; color: #7f8c8d; margin-bottom: 5px;">鑑定結果：你的心靈屬性是</div>
        
        <div id="result-img"></div>
        
        <h2 class="result-title" id="result-name"></h2>
        <div class="result-desc" id="result-desc"></div>
        <button class="retry-btn" onclick="retryQuiz()">再鑑定一次</button>
    </div>

</div>
