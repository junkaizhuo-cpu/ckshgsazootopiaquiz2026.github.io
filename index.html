           🍎 Apple HIG 設計系統
           ============================== */

            --apple-indigo: #5856D6;

        * {

        /* 移除 body 原有的 background 設定 */
/* 1. 鎖定 body，不讓整個網頁捲動 */
/* 1. 確保 body 不會捲動 */
body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden; /* 強制關閉頁面滾動 */
    position: relative;
}

/* 2. 背景層固定 */
.global-background {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: -1;
    background-image: url('背景.jpeg'), url('背景.jpg'), url('背景.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* 3. 滾動容器：關鍵修改 */
#quiz-container {
    width: 100vw;
    height: 100vh;
    overflow-y: auto;   /* 允許內容過長時滾動 */
    overflow-x: hidden; /* 絕對禁止水平滾動 */
    display: flex;
    flex-direction: column;
    align-items: center; /* 讓內容水平置中 */
    padding: 20px 12px;  /* 給一點上下間距 */
}

.container {
    max-width: 500px;
    width: 100%;
    /* 移除 min-height: 100vh，否則會讓內容永遠撐開導致捲動不順 */
    background: var(--card-bg);
    border-radius: 28px;
    padding: 26px 22px;
    margin-bottom: 20px; /* 底部保留一點空間 */
}


        h1 {

        .subtitle {

        .gold { background: linear-gradient(135deg, #fffbeb, #fef08a); color: #713f12; transform: rotate(2deg); box-shadow: -2px 3px 0px #d97706, -2px 6px 14px rgba(0,0,0,0.08); }
        .purple { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); color: #5b21b6; transform: rotate(-1.5deg); box-shadow: 2px 2px 0px #7c3aed, 3px 6px 14px rgba(0,0,0,0.08); }

/* 🔧 修改後：完全移除圓點，並實作身分顏色外框 */
.option-btn {
    background: rgba(255, 255, 255, 0.78);

}

/* 滑鼠移上去的效果 */
.option-btn:hover {

}

/* 選中後的樣式：外框直接變成身分色 */
.option-btn.selected {
    background: rgba(255, 255, 255, 0.95);
    border: 2px solid var(--sticker-color); /* 這就是關鍵：變成你選的身分色 */
    box-shadow: 0 6px 22px var(--sticker-color, rgba(0, 122, 255, 0.18));
}

        @keyframes selectPulse {
            0% { transform: scale(1); }
            40% { transform: scale(1.025); }
            100% { transform: scale(1); }
        }
        .option-btn.selected::after {
            content: '✓ 貼上';
            flex-shrink: 0;
            background: var(--sticker-color);

            100% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0); }

            // 預留空間：偵測小標 ~30 + 兩顆按鈕 ~140 + footer ~80 + container padding 60
            const reservedH = 310;
            const availableH = window.innerHeight - reservedH;

            if (naturalH > availableH && availableH > 0) {
                const ratio = availableH / naturalH;
                const scale = Math.max(0.55, Math.min(1, ratio));

                if (scale < 1) {
                    card.style.transformOrigin = 'top left';
                    card.style.transform = `scale(${scale})`;
                    card.style.width = `${100 / scale}%`;   // 補回寬度，讓卡片填滿 wrap

                    // wrap 高度設為縮放後的視覺高度（這樣下方 action-box 緊貼卡片）
                    const visualH = Math.ceil(naturalH * scale);
                    wrap.style.height = `${visualH}px`;
                }
            } else {
                card.style.transform = 'none';
                card.style.width = '100%';
                wrap.style.height = '';
            }
        },

        // 🌟 匯出為 IG 限動 9:16 高畫質 PNG (1080×1920)
        exportToImage: async function() {
            const targetNode = document.getElementById('profile-card-box');
            const btn = document.getElementById('export-btn-ig');
            if(!targetNode || !window.html2canvas) {
                showToast('匯出工具尚未載入，請稍候');
                return;
            }

            btn.disabled = true;
            const oldHtml = btn.innerHTML;
            btn.innerHTML = '<span class="btn-icon">⏳</span><span class="btn-text">正在生成...</span>';
            showToast('📱 正在生成高畫質報告...', 4000);

            const watermark = document.getElementById('export-watermark');
            if(watermark) {
                watermark.innerHTML = `
                    <div style="font-weight: 600; color: rgba(60, 60, 67, 0.7); margin-bottom: 2px; text-align:center; padding-top:8px; font-size:10px;">${this.userName} 的專屬畢業鑑定報告</div>
                `;
            }

            // 🔧 暫時把卡片移到 body 頂層（脫離 container），ig-story 1080px 才能正確展開
            const wrap = document.getElementById('card-scale-wrap');
            const oldTransform = targetNode.style.transform;
            const oldMarginBottom = targetNode.style.marginBottom;
            const oldWidth = targetNode.style.width;
            const oldWrapH = wrap ? wrap.style.height : '';
            targetNode.style.transform = 'none';
            targetNode.style.marginBottom = '0';
            targetNode.style.width = '';
            if(wrap) wrap.style.height = '';

            // 把卡片暫時移到 body，讓 1080px ig-story 不受 container 限制
            const placeholder = document.createElement('div');
            placeholder.style.display = 'none';
            if(wrap && wrap.firstElementChild === targetNode) {
                wrap.insertBefore(placeholder, targetNode);
            }
            document.body.appendChild(targetNode);
            targetNode.style.position = 'fixed';
            targetNode.style.top = '-9999px';
            targetNode.style.left = '0';

            targetNode.classList.add('exporting', 'ig-story');

            await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
            const allImgs = targetNode.querySelectorAll('img');
            await Promise.all(Array.from(allImgs).map(img => {
                if(img.complete && img.naturalWidth > 0) return Promise.resolve();
                return new Promise(r => {
                    const done = () => r();
                    img.addEventListener('load', done, { once: true });
                    img.addEventListener('error', done, { once: true });
                    setTimeout(done, 2500);
                });
            }));

            try {
                // 先量測實際內容高度，動態決定 height（至少 1920，不會被裁）
                const naturalH = Math.max(1920, targetNode.scrollHeight, targetNode.offsetHeight);

                const canvas = await html2canvas(targetNode, {
                    scale: 1,
                    backgroundColor: '#FFFFFF',
                    useCORS: true,
                    allowTaint: true,
                    logging: false,
                    imageTimeout: 5000,
                    width: 1080,
                    height: naturalH,
                    windowWidth: 1080,
                    windowHeight: naturalH,
                    onclone: (clonedDoc) => {
                    const originalBarcode = document.querySelector('.barcode-lines');
        const clonedBarcode = clonedDoc.querySelector('.barcode-lines');
        
        if (originalBarcode && clonedBarcode) {
            // 1. 強制把原本的寬度寫入複製的檔案裡
            const w = originalBarcode.offsetWidth;
            clonedBarcode.style.width = w + 'px';
            clonedBarcode.style.flex = 'none'; // 鎖住，不讓它伸縮
            clonedBarcode.style.minWidth = w + 'px'; // 確保不會被擠壓
        }
                        const card = clonedDoc.getElementById('profile-card-box');
                        if(card) {
                            card.style.animation = 'none';
                            card.style.transform = 'none';
                            card.style.boxShadow = 'none';
                            card.style.margin = '0';
                            card.querySelectorAll('*').forEach(el => {
                                el.style.animation = 'none';
                                el.style.transition = 'none';
                            });
                        }
                        const logBox = clonedDoc.querySelector('.quote-log-box');
    const originalLogBox = document.querySelector('.quote-log-box'); // 從原始頁面讀取

    if (logBox && originalLogBox) {
        // 1. 直接讀取原本元素當前的背景顏色（這會拿到計算後的最終色值）
        const computedStyle = window.getComputedStyle(originalLogBox);
        logBox.style.backgroundColor = computedStyle.backgroundColor;
        
        // 2. 同步 border-left 的顏色與寬度
        logBox.style.borderLeft = computedStyle.borderLeft;
    }
                    }
                    
                });
                

                const blob = await new Promise((resolve, reject) => {
                    canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob failed')), 'image/png', 1.0);
                });
                const fileName = `${this.userName}_建功畢業鑑定報告.png`;
                const dataUrl = canvas.toDataURL('image/png', 1.0);

                this._lastBlob = blob;
                this._lastDataUrl = dataUrl;
                this._lastFileName = fileName;

                // 🔧 FIX3: 開預覽 overlay，讓使用者可長按整張圖
                this.previewOpen(dataUrl);
                showToast('✅ 生成完成！', 1500);
            } catch (err) {
                console.error('匯出失敗:', err);
                showToast('⚠️ 匯出失敗，請再試一次', 2500);
            } finally {
                targetNode.classList.remove('exporting', 'ig-story');
                // 還原 scale
                // 把卡片放回 wrap
                targetNode.style.position = '';
                targetNode.style.top = '';
                targetNode.style.left = '';
                if(wrap && placeholder.parentNode === wrap) {
                    wrap.insertBefore(targetNode, placeholder);
                    placeholder.remove();
                }
                targetNode.style.transform = oldTransform;
                targetNode.style.marginBottom = oldMarginBottom;
                targetNode.style.width = oldWidth;
                if(wrap) wrap.style.height = oldWrapH;
                btn.disabled = false;
                btn.innerHTML = oldHtml;
            }
        },

        // 🔧 FIX3: 預覽相關函式
        previewOpen: function(dataUrl) {
            const overlay = document.getElementById('preview-overlay');
            const img = document.getElementById('preview-img');
            img.src = dataUrl;
            overlay.classList.add('show');

            // 不再切換按鈕顯隱（合併成一顆「下載到相簿」）
        },
        previewClose: function() {
            document.getElementById('preview-overlay').classList.remove('show');
        },
        // 智慧型下載：iOS Safari 有 Web Share API + canShare files → 跳系統分享（可選「儲存到照片」直入相簿）
        // 其他環境 → 走傳統 <a download>
        previewDownload: async function() {
            if(!this._lastBlob) return;
            const file = new File([this._lastBlob], this._lastFileName, { type: 'image/png' });
            const canShare = navigator.canShare && navigator.canShare({ files: [file] });

            if (canShare) {
                try {
                    await navigator.share({
                        files: [file],
                        title: '我的建功畢業鑑定報告',
                        text: `${this.userName} 的 2026 建功畢業鑑定報告 ✨`
                    });
                    showToast('✅ 已開啟系統選單', 1500);
                    return;
                } catch (e) {
                    if (e && e.name === 'AbortError') {
                        // 使用者取消，靜默處理
                        return;
                    }
                    console.warn('share fallback to download:', e);
                    // 落到下方 fallback
                }
            }

            // Fallback：傳統下載
            const url = URL.createObjectURL(this._lastBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = this._lastFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
            showToast('✅ 已下載！手機可長按上方圖片儲存', 2200);
        },

        resetQuiz: function() {
            this.currentQuestionIndex = 0;
            this.selectedScores = [];
            document.getElementById('result-page').className = 'hidden';
            document.getElementById('quiz-page').className = 'hidden';
            document.getElementById('start-page').className = '';
            // 還原 card 的 transform/margin
            const card = document.getElementById('profile-card-box');
            if(card) { card.style.transform = ''; card.style.marginBottom = ''; card.style.width = ''; }
            const wrap = document.getElementById('card-scale-wrap');
            if(wrap) wrap.style.height = '';
            ImageEngine.setWelcomeImage();
        }
    };

    // 視窗大小變化時重新計算結算卡縮放
    window.addEventListener('resize', () => {
        if(document.getElementById('result-page') && 
           document.getElementById('result-page').className !== 'hidden') {
            window.jgQuiz.fitCardToScreen();
        }
    });

    window.onload = function() {
        ImageEngine.setWelcomeImage();
    };
})();
</script>
