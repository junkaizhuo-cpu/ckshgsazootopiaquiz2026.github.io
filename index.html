                const qNum = index + 1;
                imgTag.style.display = 'block';
                imgTag.src = `問題${qNum}.png`;

                    badge: "2026 智商天花板檔案",
                    name: "狐狸尼克 × 副班長",
                    characterName: "狐狸尼克",
                    bg: "#fae8ff",
                    avatarSvg: `<svg viewBox="0 0 100 100" width="100%" height="100%"><circle cx="50" cy="45" r="18" fill="#9333ea"/><path d="M22 80c0-14 14-18 28-18s28 4 28 18z" fill="#9333ea"/><path d="M32 35l-10-10 4-2zM68 35l10-10-4-2z" fill="#9333ea" stroke="#1e293b" stroke-width="2"/></svg>`,
                    meta: { code: "NICK-VICE-99", danger: "65% (智商壓制)", place: "後排靠窗座位 / 考前被包圍的課桌", type: "從容智謀派" },
                    traits: ["#自己的智商", "#上課有認真聽", "#智商擔當", "#優雅省力"],
                    desc: "考前你絕對敢大膽貼上「相信自己智商」的標籤，因為你上課其實都有默默抓到核心重點，骨子裡自帶一種看透局勢的淡定。聰明、帶點讓人又愛又恨的小傲嬌，平時低調看戲、優雅省力，但大局需要時總能用高智商精準掌控，是班上的隱藏版大佬。",
                    quote: "實力擺在那裡，穩紮穩打才是最高級的優雅。"
                },
                "D": {
                    badge: "2026 校園守護神檔案",
                    name: "樹懶快俠 × 普通學生",
                    characterName: "樹懶快俠",
                    bg: "#dcfce7",
                    avatarSvg: `<svg viewBox="0 0 100 100" width="100%" height="100%"><circle cx="50" cy="45" r="20" fill="#16a34a"/><path d="M20 82c0-12 15-17 30-17s30 5 30 17z" fill="#16a34a"/><circle cx="42" cy="42" r="4" fill="#fff"/><circle cx="58" cy="42" r="4" fill="#fff"/><path d="M40 55q10 5 20 0" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`,
                    meta: { code: "FLASH-STUDENT-00", danger: "0% (療癒爆表)", place: "教室最後一排 / 合作社榕樹下", type: "療癒避風港" },
                    traits: ["#放我一馬", "#神明一定會幫助我的", "#低山臭水遇噪音", "#慢條斯理"],
                    desc: "面對壓力重重的日常，你只想高喊「放我一馬」，考前默默祈禱神明加持。你不追求職位的虛名，只想當個與世無爭、置身事外的普通學生。即使身邊的人際關係像噪音一樣煩人，你也總能用強大的冷幽默和獨特的慢節奏將其化解，活得悠閒又療癒。",
                    quote: "沒事沒事，平安畢業，順其自然。"
                }
            },

            // 【升級】自定義平滑轉場控制函式
            switchPage: function(hideId, showId) {
                document.getElementById(hideId).classList.add('hidden');
                const showEl = document.getElementById(showId);
                showEl.classList.remove('hidden');
                
                // 強制重啟 CSS 動畫，讓轉場每次都生效
                showEl.style.animation = 'none';
                showEl.offsetHeight; /* trigger reflow */
                showEl.style.animation = null;
                showEl.classList.add('page-transition');
            },

            selectIdentity: function(type) {
                const nameInput = document.getElementById('user-name');
                if (!nameInput.value.trim()) {
                    alert('請先輸入您的姓名或暱稱，才能撕下專屬貼紙喔！');
                    nameInput.focus();
                    return;
                }
                this.userName = nameInput.value.trim();
                const root = document.documentElement;
                let textColor = '#fff';
                
                if (type === 'silver') { root.style.setProperty('--sticker-color', 'rgba(203, 213, 224, 0.85)'); textColor = '#4a5568'; }
                else if (type === 'gold') { root.style.setProperty('--sticker-color', 'rgba(236, 201, 75, 0.85)'); textColor = '#744210'; }
                else if (type === 'purple') { root.style.setProperty('--sticker-color', 'rgba(159, 122, 234, 0.85)'); textColor = '#ffffff'; }
                
                root.style.setProperty('--sticker-text', textColor);
                
                setTimeout(() => {
                    // 使用升級的轉場切換
                    this.switchPage('start-page', 'quiz-page');
                    this.showQuestion();
                }, 300);
            },

            showQuestion: function() {
                if (this.currentQuestionIndex >= this.questions.length) {
                    this.showResult();
                    return;
                }

                const q = this.questions[this.currentQuestionIndex];
                document.getElementById('progress').innerText = `QUESTION ${this.currentQuestionIndex + 1} / ${this.questions.length}`;
                
                // 【升級】動態更新進度條寬度
                const progressFill = document.getElementById('progress-fill');
                const percentage = ((this.currentQuestionIndex + 1) / this.questions.length) * 100;
                progressFill.style.width = percentage + '%';

                document.getElementById('question-text').innerText = q.title;
                
                const backBtn = document.getElementById('back-btn');
                if (this.currentQuestionIndex > 0) {
                    backBtn.classList.remove('hidden');
                } else {
                    backBtn.classList.add('hidden');
                }

                ImageEngine.setQuestionImage(this.currentQuestionIndex);
                const optionsBox = document.getElementById('options-box');
                optionsBox.innerHTML = '';

                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt.text;
                    btn.onclick = () => this.selectOption(btn, opt.score);
                    optionsBox.appendChild(btn);
                });
            },

            goBack: function() {
                if (this.currentQuestionIndex > 0) {
                    this.currentQuestionIndex--;
                    this.selectedScores.pop();
                    
                    // 【升級】讓進度條也具備返回動畫
                    const showEl = document.getElementById('quiz-page');
                    showEl.style.animation = 'none';
                    showEl.offsetHeight; 
                    showEl.style.animation = null;
                    showEl.classList.add('page-transition');

                    this.showQuestion();
                }
            },

            selectOption: function(element, score) {
                element.classList.add('selected');
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b => b.style.pointerEvents = 'none');

                this.selectedScores.push(score);
                this.currentQuestionIndex++;
                setTimeout(() => {
                    this.showQuestion();
                }, 400);
            },

            showResult: function() {
                // 使用升級的轉場切換
                this.switchPage('quiz-page', 'result-page');

                const counts = {};
                let maxScore = "B";
                let maxCount = 0;
                this.selectedScores.forEach(score => {
                    counts[score] = (counts[score] || 0) + 1;
                    if (counts[score] > maxCount) {
                        maxCount = counts[score];
                        maxScore = score;
                    }
                });
                const finalResult = this.results[maxScore];
                const cardBox = document.getElementById('profile-card-box');
                
                let traitHtml = '';
                finalResult.traits.forEach(t => {
                    traitHtml += `<span class="trait-tag" style="background:${finalResult.bg}">${t}</span>`;
                });
                cardBox.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-title-area">
                            <span class="profile-badge">${finalResult.badge}</span>
                            <h2 class="profile-name">
                                ${this.userName}
                                <span>(${finalResult.name})</span>
                            </h2>
                        </div>
                        <div class="profile-avatar-box">
                            <img id="avatar-img" src="${finalResult.characterName}.jpeg" alt="${finalResult.name}">
                            <div id="avatar-svg-box" class="avatar-svg-fallback">${finalResult.avatarSvg}</div>
                        </div>
                    </div>
                    <div class="profile-meta">
                        <div class="meta-item"><span class="meta-label">動物代碼：</span><span class="meta-val">${finalResult.meta.code}</span></div>
                        <div class="meta-item"><span class="meta-label">特質歸屬：</span><span class="meta-val">${finalResult.meta.type}</span></div>
                        <div class="meta-item"><span class="meta-label">危險系數：</span><span class="meta-val">${finalResult.meta.danger}</span></div>
                        <div class="meta-item"><span class="meta-label">主要出沒：</span><span class="meta-val">${finalResult.meta.place}</span></div>
                    </div>
                    <div class="profile-body">
                        ${finalResult.desc}
                    </div>
                    <div class="profile-quote">
                        「${finalResult.quote}」
                    </div>
                    <div style="font-size:13px; font-weight:800; color:#64748b; margin-top:20px; margin-bottom:8px;">▸ 偵測解鎖貼紙標籤：</div>
                    <div class="tags-container">
                        ${traitHtml}
                    </div>
                    <div style="position:absolute; right:15px; bottom:15px; opacity:0.1; pointer-events:none;">
                        <svg width="65" height="65" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#1e293b" stroke-width="5"/>
                            <text x="50" y="55" font-size="13" font-weight="900" text-anchor="middle" fill="#1e293b">PASSED</text>
                        </svg>
                    </div>
                `;

                const avImg = document.getElementById('avatar-img');
                avImg.onerror = function() {
                    this.onerror = function() {
                        this.onerror = function() { this.style.display = 'none'; };
                        this.src = `${finalResult.characterName}.png`;
                    };
                    this.src = `${finalResult.characterName}.jpg`;
                };

                // 【升級】依據動物角色啟動對應色彩的 Confetti 撒花特效
                const confettiColorMap = {
                    "A": ["#dc2626", "#ef4444", "#fee2e2"], // 蠻牛局長（紅）
                    "B": ["#ca8a04", "#eab308", "#fef9c3"], // 兔子茱蒂（黃）
                    "C": ["#9333ea", "#a855f7", "#fae8ff"], // 狐狸尼克（紫）
                    "D": ["#16a34a", "#22c55e", "#dcfce7"]  // 樹懶快俠（綠）
                };
                const burstColors = confettiColorMap[maxScore] || ['#4a5568', '#a0aec0'];
                
                // 延遲一點點讓轉場動畫先跑，再噴發碎紙花效果更好
                setTimeout(() => {
                    confetti({
                        particleCount: 150,
                        spread: 80,
                        origin: { y: 0.6 },
                        colors: burstColors,
                        zIndex: 9999
                    });
                }, 300);
            },

            exportPDF: function() {
                const element = document.getElementById('export-area');
                const opt = {
                    margin:       15,
                    filename:     `${this.userName}_建功畢業生專屬檔案.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 3, useCORS: true, letterRendering: true, windowWidth: 800, logging: false },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save();
            },

            resetQuiz: function() {
                this.currentQuestionIndex = 0;
                this.selectedScores = [];
                this.userName = "";
                document.getElementById('user-name').value = '';
                
                // 使用升級的轉場切換回到首頁
                this.switchPage('result-page', 'start-page');
                ImageEngine.setWelcomeImage();
            }
        };

        window.onload = function() {
            ImageEngine.setWelcomeImage();
            
            const preloadImages = [
                '主視覺.jpeg', '主視覺.png', '主視覺.jpg',
                '問題1.png', '問題1.jpg', '問題1.jpeg',
                '問題2.png', '問題2.jpg', '問題2.jpeg',
                '問題3.png', '問題3.jpg', '問題3.jpeg',
                '問題4.png', '問題4.jpg', '問題4.jpeg',
                '問題5.png', '問題5.jpg', '問題5.jpeg',
                '蠻牛局長.jpeg', '蠻牛局長.png', '蠻牛局長.jpg',
                '兔子茱蒂.jpeg', '兔子茱蒂.png', '兔子茱蒂.jpg',
                '狐狸尼克.jpeg', '狐狸尼克.png', '狐狸尼克.jpg',
                '樹懶快俠.jpeg', '樹懶快俠.png', '樹懶快俠.jpg'
            ];
            
            preloadImages.forEach(src => {
                const img = new Image();
                img.src = src;
            });
        };
    </script>
</head>
<body>

<div class="container">
    <div id="start-page" class="page-transition">
        <h1>2026 建功人請回答！！</h1>
        <div class="image-box">
            <img id="welcome-img" src="主視覺.jpeg" alt="建功心測主視覺">
        </div>
        <p class="subtitle">
            這個測驗是畢聯會為建功人設計的，準備好迎接即將到來的畢業典禮嗎！快來看看你在建功動物城是什麼角色吧！希望大家可以透過一些小問題面對更真實的自己~~
        </p>
        
        <input type="text" id="user-name" class="name-input" placeholder="請輸入您的姓名或暱稱" required>

        <p style="font-size: 16px; font-weight: 800; color: #334155; margin-bottom: 8px;">撕下一張你的專屬貼紙身分：</p>
        
        <div class="identity-container">
            <button class="sticker-btn silver" onclick="window.jgQuiz.selectIdentity('silver')">國中生</button>
            <button class="sticker-btn gold" onclick="window.jgQuiz.selectIdentity('gold')">高中生</button>
            <button class="sticker-btn purple" onclick="window.jgQuiz.selectIdentity('purple')">家長及外賓</button>
        </div>
    </div>

    <!-- 測驗頁面 -->
    <div id="quiz-page" class="hidden">
        <div class="quiz-header-wrapper">
            <div class="quiz-header-top">
                <div id="progress" class="progress-text"></div>
                <button id="back-btn" class="back-btn hidden" onclick="window.jgQuiz.goBack()">← 上一題</button>
            </div>
            <!-- 【升級】視覺化動態進度條 HTML 結構 -->
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>
        </div>
        
        <div class="image-box">
            <img id="quiz-img" src="" alt="問題插圖">
            <div id="quiz-svg-fallback" class="svg-fallback"></div>
        </div>
        <div class="question-title" id="question-text"></div>
        <div class="options-container" id="options-box"></div>
    </div>

    <!-- 結果頁面 -->
    <div id="result-page" class="hidden">
        <div style="font-size: 15px; font-weight: 800; color: #64748b; margin-bottom: 12px; text-align: left;">▸ 畢聯會大數據精密 analysis：</div>
        
        <div id="export-area">
            <div class="profile-card" id="profile-card-box"></div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn restart-btn" onclick="window.jgQuiz.resetQuiz()">再測一次</button>
            <button class="action-btn pdf-btn" onclick="window.jgQuiz.exportPDF()">📥 匯出 PDF</button>
        </div>
    </div>

    <footer>
        © 2026 新竹市立建功高級中學 X 建功畢聯會<br>
        Hsinchu Municipal Chien Kung Senior High School
    </footer>
</div>

</body>
</html>
