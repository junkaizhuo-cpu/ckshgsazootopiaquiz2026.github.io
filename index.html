<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>2026 建功人請回答！！畢業限定心理測驗</title>

    <!-- 🌟 html2canvas：直接擷取 DOM，畫質高、字體準 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* ==============================
           🍎 Apple HIG 設計系統
           ============================== */
        :root {
            --apple-blue: #007AFF;
            --apple-indigo: #5856D6;
            --apple-purple: #AF52DE;
            --apple-pink: #FF2D55;
            --apple-green: #34C759;
            --apple-gray-1: #8E8E93;
            --apple-gray-5: #E5E5EA;
            --apple-gray-6: #F2F2F7;
            
            --label-primary: #000000;
            --label-secondary: rgba(60, 60, 67, 0.85);
            --label-tertiary: rgba(60, 60, 67, 0.6);
            --label-quaternary: rgba(60, 60, 67, 0.3);
            
            --card-bg: rgba(255, 255, 255, 0.82);
            --sticker-color: #cbd5e0;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'PingFang TC', 'Helvetica Neue', 'Microsoft JhengHei', sans-serif;
            background-color: #F2F2F7;
            background-image: url('背景.jpeg'), url('背景.jpg'), url('背景.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--label-primary);
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.47;
            letter-spacing: -0.01em;
        }

        #quiz-container {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 0;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: 
                0 1px 2px rgba(0, 0, 0, 0.04),
                0 8px 24px rgba(0, 0, 0, 0.08),
                0 24px 56px rgba(0, 0, 0, 0.06);
            padding: 26px 22px;
            text-align: center;
            border: 0.5px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            position: relative;
        }

        h1 {
            color: var(--label-primary);
            font-size: 26px;
            font-weight: 700;
            margin-top: 4px;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
            line-height: 1.15;
        }

        .subtitle {
            color: var(--label-secondary);
            font-size: 14px;
            line-height: 1.55;
            margin-bottom: 22px;
            text-align: justify;
            letter-spacing: -0.005em;
        }

        .hidden { display: none !important; }

        #start-page, #quiz-page, #result-page {
            animation: pageSlide 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }
        @keyframes pageSlide {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .name-input-box {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            background: rgba(118, 118, 128, 0.12);
            border-radius: 12px;
            margin-bottom: 18px;
            text-align: center;
            outline: none;
            transition: all 0.25s cubic-bezier(0.32, 0.72, 0, 1);
            color: var(--label-primary);
            letter-spacing: -0.01em;
        }
        .name-input-box::placeholder { color: var(--label-tertiary); font-weight: 400; }
        .name-input-box:focus {
            background: rgba(118, 118, 128, 0.18);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.22);
        }

        .image-box {
            width: 100%;
            height: 160px; 
            border-radius: 18px;
            margin-bottom: 18px;
            overflow: hidden;
            background: rgba(118, 118, 128, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            animation: imgFade 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }
        @keyframes imgFade {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .quiz-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--apple-blue);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: opacity 0.2s;
            visibility: hidden;
            letter-spacing: -0.01em;
        }
        .back-btn:hover { opacity: 0.6; }
        .back-btn:active { opacity: 0.4; }

        .progress-wrap { margin-bottom: 18px; }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .progress-meta .progress-label { color: var(--label-tertiary); }
        .progress-meta .progress-percent {
            color: var(--apple-blue);
            font-variant-numeric: tabular-nums;
            font-size: 12px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(118, 118, 128, 0.16);
            border-radius: 50px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar-fg {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--apple-blue), var(--apple-indigo), var(--apple-purple));
            background-size: 200% 100%;
            border-radius: 50px;
            transition: width 0.6s cubic-bezier(0.32, 0.72, 0, 1);
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }
        .progress-dots {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding: 0 1px;
        }
        .progress-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(118, 118, 128, 0.24);
            transition: all 0.45s cubic-bezier(0.32, 0.72, 0, 1.4);
        }
        .progress-dot.done {
            background: var(--apple-blue);
            transform: scale(1.3);
        }
        .progress-dot.current {
            background: var(--apple-indigo);
            transform: scale(1.7);
            box-shadow: 0 0 0 4px rgba(88, 86, 214, 0.18);
            animation: pulse 1.6s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 4px rgba(88, 86, 214, 0.18); }
            50% { box-shadow: 0 0 0 8px rgba(88, 86, 214, 0.06); }
        }

        .identity-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin: 10px 0;
            padding: 18px 14px;
            background: rgba(118, 118, 128, 0.08);
            border-radius: 18px;
        }

        .sticker-btn {
            padding: 12px 22px;
            border: 2.5px solid #ffffff;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
            letter-spacing: -0.005em;
        }

        .silver { background: linear-gradient(135deg, #f1f5f9, #cbd5e1); color: #334155; transform: rotate(-2.5deg); box-shadow: 2px 3px 0px #94a3b8, 2px 6px 14px rgba(0,0,0,0.08); }
        .gold { background: linear-gradient(135deg, #fffbeb, #fef08a); color: #713f12; transform: rotate(2deg); box-shadow: -2px 3px 0px #d97706, -2px 6px 14px rgba(0,0,0,0.08); }
        .purple { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); color: #5b21b6; transform: rotate(-1.5deg); box-shadow: 2px 2px 0px #7c3aed, 3px 6px 14px rgba(0,0,0,0.08); }

        .sticker-btn:hover { transform: scale(1.06) rotate(0deg) translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.12); z-index: 10; }
        .sticker-btn:active { transform: scale(0.95); }

        .question-title {
            font-size: 20px;
            font-weight: 700;
            margin-top: 4px;
            margin-bottom: 18px;
            color: var(--label-primary);
            line-height: 1.3;
            text-align: left;
            letter-spacing: -0.02em;
        }

        .options-container { display: flex; flex-direction: column; gap: 10px; }

        .option-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 0.5px solid rgba(60, 60, 67, 0.18);
            padding: 15px 18px;
            border-radius: 14px;
            text-align: left;
            font-size: 16px;
            font-weight: 500;
            color: var(--label-primary);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.32, 0.72, 0, 1);
            position: relative;
            line-height: 1.35;
            letter-spacing: -0.01em;
            backdrop-filter: blur(8px);
            font-family: inherit;
        }
        .option-btn:hover { 
            background: rgba(255, 255, 255, 0.95);
            border-color: rgba(60, 60, 67, 0.28);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.selected {
            background: linear-gradient(135deg, rgba(0, 122, 255, 0.08), rgba(88, 86, 214, 0.10));
            border-color: var(--apple-blue);
            color: var(--label-primary);
            animation: selectPulse 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes selectPulse {
            0% { transform: scale(1); }
            40% { transform: scale(1.025); box-shadow: 0 10px 24px rgba(0, 122, 255, 0.18); }
            100% { transform: scale(1); }
        }

        .option-btn.selected::after {
            content: '✓ 已貼上';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--sticker-color);
            color: var(--sticker-text, #fff);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 0;
            animation: stamp 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes stamp {
            0% { transform: translateY(-50%) scale(3) rotate(-15deg); opacity: 0; filter: blur(2px); }
            60% { transform: translateY(-50%) scale(1.15) rotate(3deg); opacity: 1; filter: blur(0); }
            100% { transform: translateY(-50%) scale(1) rotate(0deg); opacity: 1; filter: blur(0); }
        }

        .confetti {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 14px;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
        }

        .profile-card {
            background: #ffffff;
            border: 0.5px solid rgba(60, 60, 67, 0.12);
            border-radius: 22px;
            padding: 22px 20px;
            margin-top: 12px;
            text-align: left;
            position: relative;
            box-shadow: 
                0 1px 2px rgba(0, 0, 0, 0.04),
                0 4px 14px rgba(0, 0, 0, 0.06),
                0 14px 36px rgba(0, 0, 0, 0.04);
            animation: cardPop 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }
        @keyframes cardPop {
            0% { opacity: 0; transform: translateY(20px) scale(0.94); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .profile-header {
            border-bottom: 0.5px solid rgba(60, 60, 67, 0.16);
            padding-bottom: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
        }

        .profile-title-area { flex: 1; }
        .profile-avatar-box {
            width: 78px; height: 78px; 
            border-radius: 18px; 
            overflow: hidden; 
            background: rgba(118, 118, 128, 0.08); 
            flex-shrink: 0; 
            box-shadow: 
                0 1px 2px rgba(0, 0, 0, 0.06),
                0 4px 12px rgba(0, 0, 0, 0.08);
        }
        .profile-avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .profile-badge { 
            font-size: 11px; 
            background: var(--label-primary); 
            color: #fff; 
            padding: 4px 11px; 
            border-radius: 50px; 
            font-weight: 600; 
            display: inline-block; 
            margin-bottom: 8px; 
            letter-spacing: 0.02em;
        }
        .profile-name { 
            font-size: 22px; 
            font-weight: 700; 
            color: var(--label-primary); 
            margin: 0; 
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .profile-meta {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px;
            background: rgba(118, 118, 128, 0.07); 
            padding: 14px; 
            border-radius: 14px; 
            margin-bottom: 18px; 
        }
        .meta-item { line-height: 1.45; white-space: normal; word-break: break-all; }
        .meta-label { 
            font-weight: 600; 
            color: var(--label-tertiary); 
            display: block; 
            margin-bottom: 2px; 
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .meta-val { color: var(--label-primary); font-weight: 600; font-size: 13.5px; letter-spacing: -0.005em; }

        @media (max-width: 440px) { 
            .profile-meta { grid-template-columns: 1fr; gap: 8px; padding: 12px; }
            .container { padding: 22px 18px; border-radius: 24px; }
            h1 { font-size: 23px; }
            .image-box { height: 140px; margin-bottom: 16px; }
            .question-title { font-size: 18px; margin-bottom: 14px; }
            .option-btn { padding: 13px 16px; font-size: 15px; }
            .profile-card { padding: 20px 18px; }
            .profile-name { font-size: 19px; }
            .profile-avatar-box { width: 68px; height: 68px; border-radius: 16px; }
            .subtitle { font-size: 13.5px; margin-bottom: 18px; }
            .identity-container { padding: 14px 12px; gap: 10px; }
            .sticker-btn { padding: 10px 18px; font-size: 14px; }
            .profile-body { font-size: 14.5px; }
            .action-btn { padding: 13px 24px; font-size: 15px; }
            footer { margin-top: 20px; font-size: 10.5px; }
            body { padding: 8px; }
            #quiz-container { padding: 8px 0; }
        }

        .profile-body { 
            font-size: 15px; 
            line-height: 1.65; 
            color: var(--label-secondary); 
            text-align: justify; 
            letter-spacing: -0.005em;
        }
        .profile-quote { 
            background: rgba(118, 118, 128, 0.08); 
            border-left: 3px solid var(--apple-indigo); 
            padding: 12px 16px; 
            font-style: italic; 
            font-weight: 600; 
            margin-top: 16px; 
            border-radius: 0 12px 12px 0; 
            font-size: 14.5px; 
            color: var(--label-primary); 
            letter-spacing: -0.005em;
        }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .trait-tag { 
            font-size: 12px; 
            padding: 5px 12px; 
            border-radius: 50px; 
            font-weight: 600; 
            color: var(--label-primary); 
            animation: tagPop 0.5s cubic-bezier(0.32, 0.72, 0, 1.4) backwards;
            letter-spacing: -0.005em;
        }
        .trait-tag:nth-child(1) { animation-delay: 0.1s; }
        .trait-tag:nth-child(2) { animation-delay: 0.2s; }
        .trait-tag:nth-child(3) { animation-delay: 0.3s; }
        .trait-tag:nth-child(4) { animation-delay: 0.4s; }
        @keyframes tagPop {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .tag-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--label-tertiary);
            margin-top: 16px;
            margin-bottom: 8px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        /* 匯出時的浮水印（平常隱藏） */
        .export-only { display: none; }
        .profile-card.exporting .export-only {
            display: block;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 0.5px dashed rgba(60, 60, 67, 0.18);
            text-align: center;
            font-size: 10.5px;
            color: var(--label-tertiary);
            font-weight: 500;
            letter-spacing: 0.02em;
            line-height: 1.5;
        }

        .action-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .action-btn {
            border: none; 
            padding: 15px 28px; 
            border-radius: 14px; 
            cursor: pointer;
            font-size: 16px; 
            font-weight: 600; 
            width: 100%; 
            transition: all 0.25s cubic-bezier(0.32, 0.72, 0, 1);
            letter-spacing: -0.01em;
            font-family: inherit;
        }
        .export-btn { 
            background: linear-gradient(180deg, #34C759, #30B350); 
            color: white; 
            box-shadow: 
                0 1px 2px rgba(52, 199, 89, 0.2),
                0 4px 14px rgba(52, 199, 89, 0.25);
        }
        .export-btn:hover { 
            transform: translateY(-1px); 
            filter: brightness(1.04); 
            box-shadow: 
                0 2px 4px rgba(52, 199, 89, 0.25),
                0 8px 22px rgba(52, 199, 89, 0.32);
        }
        .export-btn:active { transform: scale(0.98); filter: brightness(0.96); }
        .export-btn:disabled { opacity: 0.6; cursor: wait; transform: none; }
        
        .restart-btn { 
            background: rgba(118, 118, 128, 0.16); 
            color: var(--label-primary); 
            backdrop-filter: blur(8px);
        }
        .restart-btn:hover { background: rgba(118, 118, 128, 0.22); transform: translateY(-1px); }
        .restart-btn:active { transform: scale(0.98); }

        footer { 
            margin-top: 24px; 
            font-size: 11px; 
            color: var(--label-tertiary); 
            font-weight: 500; 
            letter-spacing: -0.005em;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(20, 20, 20, 0.92);
            color: #fff;
            padding: 12px 22px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 10000;
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            letter-spacing: -0.01em;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="quiz-container">
        
        <div class="container">
            
            <div id="start-page">
                <h1>2026 建功人請回答！！</h1>
                <div class="image-box">
                    <img id="welcome-img" src="主視覺.jpeg" alt="建功心測主視覺">
                </div>
                <p class="subtitle">
                    這個測驗是畢聯會為建功人設計的，準備好迎接即將到來的畢業典禮嗎！快來看看你在建功動物城是什麼角色吧！希望大家可以透過一些小問題面對更真實的自己~~
                </p>
                
                <p style="font-size: 14.5px; font-weight: 600; color: var(--label-secondary); margin-bottom: 8px; letter-spacing: -0.005em;">填入你的畢業大名 / 暱稱：</p>
                <input type="text" id="user-name-input" class="name-input-box" placeholder="例如：萬年班長小明 (限8字)" maxlength="8">

                <p style="font-size: 14.5px; font-weight: 600; color: var(--label-secondary); margin-bottom: 5px; letter-spacing: -0.005em;">撕下一張你的專屬貼紙身分：</p>
                <div class="identity-container">
                    <button class="sticker-btn silver" onclick="window.jgQuiz.selectIdentity('silver')">國中生</button>
                    <button class="sticker-btn gold" onclick="window.jgQuiz.selectIdentity('gold')">高中生</button>
                    <button class="sticker-btn purple" onclick="window.jgQuiz.selectIdentity('purple')">家長及外賓</button>
                </div>
            </div>

            <div id="quiz-page" class="hidden">
                <div class="quiz-top-bar">
                    <button id="back-btn" class="back-btn" onclick="window.jgQuiz.prevQuestion()">← 上一頁</button>
                    <div id="progress-text" style="font-size: 11px; color: var(--label-tertiary); font-weight: 600; letter-spacing: 0.05em;"></div>
                </div>

                <div class="progress-wrap">
                    <div class="progress-meta">
                        <span class="progress-label" id="progress-label">作答中</span>
                        <span class="progress-percent" id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fg" id="progress-bar"></div>
                    </div>
                    <div class="progress-dots" id="progress-dots"></div>
                </div>

                <div class="image-box">
                    <img id="quiz-img" src="" alt="問題插圖">
                </div>
                <div class="question-title" id="question-text"></div>
                <div class="options-container" id="options-box"></div>
            </div>

            <div id="result-page" class="hidden">
                <div id="result-header-text" style="font-size: 13.5px; font-weight: 600; color: var(--label-tertiary); margin-bottom: 8px; text-align: left; letter-spacing: -0.005em;"></div>
                
                <div class="profile-card" id="profile-card-box"></div>
                
                <div class="action-box">
                    <button id="export-btn-main" class="action-btn export-btn" onclick="window.jgQuiz.exportToImage()">📸 儲存鑑定報告 (高畫質 PNG)</button>
                    <button class="action-btn restart-btn" onclick="window.jgQuiz.resetQuiz()">重新建檔 / 再測一次</button>
                </div>
            </div>

            <footer>
                新竹市立建功高級中學 X 2026建功畢聯會<br>
                Hsinchu Municipal Chien Kang Senior High School
            </footer>
        </div>
        
    </div>

    <div id="toast" class="toast"></div>

<script>
(function() {
    const questions = [
        { title: "明天要考試，今天晚上我會選擇...", options: [{ text: "#想辦法捲死同學", score: "A" }, { text: "#與周公約會", score: "B" }] },
        { title: "考前我更願意相信...", options: [{ text: "#自己的智商", score: "C" }, { text: "#神明一定會幫助我的", score: "D" }] },
        { title: "關於上學...", options: [{ text: "#上課有認真聽", score: "C" }, { text: "#有來學校就很棒了", score: "B" }] },
        { title: "和朋友的相處...", options: [{ text: "#高山流水遇知音", score: "A" }, { text: "#低山臭水遇噪音", score: "D" }] },
        { title: "面對未來的困難...", options: [{ text: "#放馬過來", score: "A" }, { text: "#放我一馬", score: "D" }] }
    ];

    window.quizResultsDatabase = {
        "A": { badge: "2026 頂峰執行者檔案", name: "蠻牛局長 × 風紀股長", characterName: "蠻牛局長", bg: "#fee2e2", meta: { code: "BOGO-BOSS-01", danger: "98%", place: "高三衝刺K書中心 / 糾察哨口", type: "鐵血行動派" }, traits: ["#放馬過來", "#想辦法捲死同學", "#氣場兩米八", "#高山流水遇知音"], desc: "你就是那個面對未知挑戰敢正面大喊「放馬過來」的絕對強者！在學校裡遇到競爭會瞬間激發滿滿的戰鬥力，實力上演捲死同學的戲碼。你目標明確、效率極高，擁有不可動搖的霸氣。畢業後絕對是社會上打破常規、開疆闢土的開路先鋒！", quote: "別擋路，我的目標只有頂峰。" },
        "B": { badge: "2026 活力夢想家檔案", name: "兔子茱蒂 × 體育股長", characterName: "兔子茱蒂", bg: "#fef9c3", meta: { code: "JUDY-SPORTS-26", danger: "15%", place: "操場跑道 / 體育器材室", type: "佛系熱血派" }, traits: ["#有來學校就很棒了", "#與周公約會", "#熱血滿點", "#元氣輸出"], desc: "你抱持著「有來學校就很棒了」的樂活達人態度，雖然昨晚可能還在跟周公進行深度約會，但點燃熱情的速度比誰都快！看似無害其實內心生命力爆棚。只要運動會或活動號角響起，你就是全班的動能核心！", quote: "生活要懂得放鬆，但好玩的事情我絕不缺席！" },
        "C": { badge: "2026 智商天花板檔案", name: "狐狸尼克 × 副班長", characterName: "狐狸尼克", bg: "#fae8ff", meta: { code: "NICK-VICE-99", danger: "65%", place: "後排靠窗座位 / 考前被包圍的課桌", type: "從容智謀派" }, traits: ["#自己的智商", "#上課有認真聽", "#智商擔當", "#優雅省力"], desc: "考前你絕對敢大膽貼上「相信自己智商」的標籤，因為你上課其實都有默默抓到核心重點，骨子裡自帶一種看透局勢的淡定。聰明、帶點讓人又愛又恨的小傲嬌，平時低調看戲、優雅省力，但大局需要時總能用高智商精準掌控，是班上的隱藏版大佬。", quote: "實力擺在那裡，穩紮穩打才是最高級的優雅。" },
        "D": { badge: "2026 校園守護神檔案", name: "樹懶快俠 × 普通學生", characterName: "樹懶快俠", bg: "#dcfce7", meta: { code: "FLASH-STUDENT-00", danger: "0%", place: "教室最後一排 / 合作社榕樹下", type: "療癒避風港" }, traits: ["#放我一馬", "#神明一定會幫助我的", "#低山臭水遇噪音", "#慢條斯理"], desc: "面對壓力重重的日常，你只想高喊「放我一馬」，考前默默祈禱神明加持。你不追求職位的虛名，只想當個與世無爭、置身事外的普通學生。即使身邊的人際關係像噪音一樣煩人，你也總能用強大的冷幽默和獨特的慢節奏將其化解，活得悠閒又療癒。", quote: "沒事沒事，平安畢業，順其自然。" }
    };

    const ImageEngine = {
        setQuestionImage: function(index) {
            const imgTag = document.getElementById('quiz-img');
            if(!imgTag) return;
            const qNum = index + 1;
            imgTag.src = `問題${qNum}.png`;
            imgTag.onerror = function() {
                this.onerror = function() {
                    this.onerror = function() { this.src = ''; };
                    this.src = `問題${qNum}.jpg`;
                };
                this.src = `問題${qNum}.jpeg`;
            };
        },
        setWelcomeImage: function() {
            const imgTag = document.getElementById('welcome-img');
            if(!imgTag) return;
            imgTag.src = '主視覺.jpeg';
            imgTag.onerror = function() {
                this.onerror = function() { this.src = '主視覺.png'; };
                this.src = '主視覺.jpg';
            };
        }
    };

    function fireConfetti() {
        const colors = ['#FF2D55', '#FF9500', '#FFCC00', '#34C759', '#007AFF', '#5856D6', '#AF52DE'];
        const total = 42;
        for(let i = 0; i < total; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = (Math.random() * 100) + 'vw';
            c.style.background = colors[Math.floor(Math.random() * colors.length)];
            c.style.animationDuration = (1.8 + Math.random() * 1.4) + 's';
            c.style.animationDelay = (Math.random() * 0.3) + 's';
            c.style.transform = `rotate(${Math.random() * 360}deg)`;
            if(Math.random() > 0.5) { c.style.borderRadius = '50%'; }
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 3500);
        }
    }

    function showToast(msg, duration) {
        duration = duration || 2000;
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        if(window._toastTimer) clearTimeout(window._toastTimer);
        window._toastTimer = setTimeout(() => {
            t.classList.remove('show');
        }, duration);
    }

    window.jgQuiz = {
        currentQuestionIndex: 0,
        selectedScores: [],
        userName: "建功人",

        selectIdentity: function(type) {
            const inputName = document.getElementById('user-name-input').value.trim();
            if(inputName) { this.userName = inputName; }

            const root = document.documentElement;
            let textColor = '#fff';
            if (type === 'silver') { root.style.setProperty('--sticker-color', '#cbd5e0'); textColor = '#4a5568'; }
            else if (type === 'gold') { root.style.setProperty('--sticker-color', '#ecc94b'); textColor = '#744210'; }
            else if (type === 'purple') { root.style.setProperty('--sticker-color', '#9f7aea'); textColor = '#ffffff'; }
            root.style.setProperty('--sticker-text', textColor);

            document.getElementById('start-page').className = 'hidden';
            document.getElementById('quiz-page').className = '';
            this.buildProgressDots();
            this.showQuestion();
        },

        buildProgressDots: function() {
            const dotsBox = document.getElementById('progress-dots');
            dotsBox.innerHTML = '';
            for(let i = 0; i < questions.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                dotsBox.appendChild(dot);
            }
        },

        updateProgress: function() {
            const total = questions.length;
            const current = this.currentQuestionIndex;
            const percent = Math.round((current / total) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percent').innerText = percent + '%';
            document.getElementById('progress-text').innerText = `QUESTION ${current + 1} / ${total}`;
            
            const labels = ['開始作答', '繼續加油', '已過半囉', '快完成了', '最後一題'];
            document.getElementById('progress-label').innerText = labels[Math.min(current, labels.length - 1)];

            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((d, i) => {
                d.classList.remove('done', 'current');
                if(i < current) d.classList.add('done');
                else if(i === current) d.classList.add('current');
            });
        },

        showQuestion: function() {
            if (this.currentQuestionIndex >= questions.length) {
                this.showResult();
                return;
            }

            const backBtn = document.getElementById('back-btn');
            if(this.currentQuestionIndex > 0) {
                backBtn.style.visibility = 'visible';
            } else {
                backBtn.style.visibility = 'hidden';
            }

            const q = questions[this.currentQuestionIndex];
            this.updateProgress();
            document.getElementById('question-text').innerText = q.title;
            
            ImageEngine.setQuestionImage(this.currentQuestionIndex);

            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.style.animation = `pageSlide 0.4s cubic-bezier(0.32, 0.72, 0, 1) ${0.1 + idx * 0.08}s backwards`;
                btn.onclick = () => this.selectOption(btn, opt.score);
                optionsBox.appendChild(btn);
            });
        },

        selectOption: function(element, score) {
            element.classList.add('selected');
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.style.pointerEvents = 'none');

            this.selectedScores.push(score);
            this.currentQuestionIndex++;

            const percent = Math.round((this.currentQuestionIndex / questions.length) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percent').innerText = percent + '%';

            setTimeout(() => {
                this.showQuestion();
            }, 480); 
        },

        prevQuestion: function() {
            if(this.currentQuestionIndex > 0) {
                this.currentQuestionIndex--;
                this.selectedScores.pop(); 
                this.showQuestion();
            }
        },

        showResult: function() {
            document.getElementById('quiz-page').className = 'hidden';
            document.getElementById('result-page').className = '';

            const counts = {};
            let maxScore = "B";
            let maxCount = 0;

            this.selectedScores.forEach(score => {
                counts[score] = (counts[score] || 0) + 1;
                if (counts[score] > maxCount) { maxCount = counts[score]; maxScore = score; }
            });

            const finalResult = window.quizResultsDatabase[maxScore];
            
            document.getElementById('result-header-text').innerText = `▸ 偵測 [${this.userName}] 的大數據精密 analysis：`;

            const cardBox = document.getElementById('profile-card-box');
            let traitHtml = '';
            finalResult.traits.forEach(t => {
                traitHtml += `<span class="trait-tag" style="background:${finalResult.bg}">${t}</span>`;
            });

            cardBox.innerHTML = `
                <div class="profile-header">
                    <div class="profile-title-area">
                        <span class="profile-badge">${finalResult.badge}</span>
                        <h2 class="profile-name">${finalResult.name}</h2>
                    </div>
                    <div class="profile-avatar-box">
                        <img src="${finalResult.characterName}.jpeg" onerror="this.onerror=null; this.src='${finalResult.characterName}.jpg'; this.onerror=function(){this.src='${finalResult.characterName}.png';};" alt="${finalResult.name}">
                    </div>
                </div>
                <div class="profile-meta">
                    <div class="meta-item"><span class="meta-label">動物代碼</span><span class="meta-val">${finalResult.meta.code}</span></div>
                    <div class="meta-item"><span class="meta-label">特質歸屬</span><span class="meta-val">${finalResult.meta.type}</span></div>
                    <div class="meta-item"><span class="meta-label">危險系數</span><span class="meta-val">${finalResult.meta.danger}</span></div>
                    <div class="meta-item"><span class="meta-label">主要出沒</span><span class="meta-val">${finalResult.meta.place}</span></div>
                </div>
                <div class="profile-body">
                    ${finalResult.desc}
                </div>
                <div class="profile-quote">
                    「${finalResult.quote}」
                </div>
                <div class="tag-section-title">偵測解鎖貼紙標籤</div>
                <div class="tags-container">
                    ${traitHtml}
                </div>
                <div class="export-only" id="export-watermark"></div>
            `;

            setTimeout(fireConfetti, 200);
        },

        // 🌟 用 html2canvas 截 DOM，scale=3 → 超高畫質 PNG，只擷取卡片本體
        exportToImage: async function() {
            const targetNode = document.getElementById('profile-card-box');
            const btn = document.getElementById('export-btn-main');
            if(!targetNode || !window.html2canvas) {
                showToast('匯出工具尚未載入，請稍候');
                return;
            }

            btn.disabled = true;
            const oldText = btn.innerText;
            btn.innerText = '⏳ 正在生成高畫質報告...';
            showToast('📸 正在生成高畫質報告...', 4000);

            // 加上匯出時專屬浮水印
            const watermark = document.getElementById('export-watermark');
            if(watermark) {
                watermark.innerHTML = `
                    <div style="font-weight: 600; color: rgba(60, 60, 67, 0.65); margin-bottom: 3px;">${this.userName} 的專屬畢業鑑定報告</div>
                    <div>新竹市立建功高級中學 × 2026 建功畢聯會</div>
                `;
            }

            targetNode.classList.add('exporting');

            // 等動畫穩定 + 圖片載入
            await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
            const avatarImg = targetNode.querySelector('.profile-avatar-box img');
            if(avatarImg && !avatarImg.complete) {
                await new Promise(r => {
                    avatarImg.onload = r;
                    avatarImg.onerror = r;
                    setTimeout(r, 2000);
                });
            }

            try {
                const canvas = await html2canvas(targetNode, {
                    scale: 3,                              // 3 倍解析度 → 超清晰
                    backgroundColor: '#FFFFFF',            // 純白底，不含外面紫漸層
                    useCORS: true,
                    allowTaint: true,
                    logging: false,
                    imageTimeout: 5000,
                    onclone: (clonedDoc) => {
                        const card = clonedDoc.getElementById('profile-card-box');
                        if(card) {
                            card.style.animation = 'none';
                            card.style.transform = 'none';
                            card.style.boxShadow = 'none';
                            card.style.margin = '0';
                            card.querySelectorAll('*').forEach(el => {
                                el.style.animation = 'none';
                                el.style.transition = 'none';
                            });
                        }
                    }
                });

                // PNG 輸出（無損，色彩最飽和）
                const dataURL = canvas.toDataURL('image/png', 1.0);
                const downloadLink = document.createElement('a');
                downloadLink.href = dataURL;
                downloadLink.download = `${this.userName}_建功畢業鑑定報告.png`;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

                showToast('✅ 報告已儲存！', 2000);
            } catch (err) {
                console.error('匯出失敗:', err);
                showToast('⚠️ 匯出失敗，請再試一次', 2500);
            } finally {
                targetNode.classList.remove('exporting');
                btn.disabled = false;
                btn.innerText = oldText;
            }
        },

        resetQuiz: function() {
            this.currentQuestionIndex = 0;
            this.selectedScores = [];
            document.getElementById('result-page').className = 'hidden';
            document.getElementById('quiz-page').className = 'hidden';
            document.getElementById('start-page').className = '';
            ImageEngine.setWelcomeImage();
        }
    };

    window.onload = function() {
        ImageEngine.setWelcomeImage();
    };
})();
</script>

</body>
</html>
