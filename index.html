<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>2026 建功人請回答！！畢業限定心理測驗</title>

    <!-- 🌟 html2canvas：直接擷取 DOM，畫質高、字體準 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* ==============================
           🍎 Apple HIG 設計系統
           ============================== */
        :root {
            --apple-blue: #007AFF;
            --apple-indigo: #5856D6;
            --apple-purple: #AF52DE;
            --apple-pink: #FF2D55;
            --apple-green: #34C759;
            --apple-gray-1: #8E8E93;
            --apple-gray-5: #E5E5EA;
            --apple-gray-6: #F2F2F7;
            
            --label-primary: #000000;
            --label-secondary: rgba(60, 60, 67, 0.85);
            --label-tertiary: rgba(60, 60, 67, 0.6);
            --label-quaternary: rgba(60, 60, 67, 0.3);
            
            --card-bg: rgba(255, 255, 255, 0.82);
            --sticker-color: #cbd5e0;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'PingFang TC', 'Helvetica Neue', 'Microsoft JhengHei', sans-serif;
            background-color: #F2F2F7;
            background-image: url('背景.jpeg'), url('背景.jpg'), url('背景.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--label-primary);
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.47;
            letter-spacing: -0.01em;
        }

        #quiz-container {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 0;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: 
                0 1px 2px rgba(0, 0, 0, 0.04),
                0 8px 24px rgba(0, 0, 0, 0.08),
                0 24px 56px rgba(0, 0, 0, 0.06);
            padding: 26px 22px;
            text-align: center;
            border: 0.5px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            position: relative;
        }

        h1 {
            color: var(--label-primary);
            font-size: 28px;
            font-weight: 800;
            margin-top: 4px;
            margin-bottom: 12px;
            letter-spacing: -0.028em;
            line-height: 1.12;
            background: linear-gradient(120deg, #1a1a1a 0%, #5856D6 50%, #AF52DE 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* 首頁頂端小標籤 */
        .top-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--apple-indigo);
            padding: 5px 12px;
            background: rgba(88, 86, 214, 0.1);
            border: 0.5px solid rgba(88, 86, 214, 0.18);
            border-radius: 50px;
            margin-bottom: 12px;
        }
        .top-eyebrow::before {
            content: "";
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--apple-pink);
            box-shadow: 0 0 8px var(--apple-pink);
            animation: dotPulse 1.8s ease-in-out infinite;
        }

        .subtitle {
            color: var(--label-secondary);
            font-size: 14.5px;
            line-height: 1.6;
            margin-bottom: 24px;
            text-align: justify;
            letter-spacing: -0.005em;
        }

        .hidden { display: none !important; }

        #start-page, #quiz-page, #result-page {
            animation: pageSlide 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }
        @keyframes pageSlide {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .name-input-box {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            background: rgba(118, 118, 128, 0.12);
            border-radius: 12px;
            margin-bottom: 18px;
            text-align: center;
            outline: none;
            transition: all 0.25s cubic-bezier(0.32, 0.72, 0, 1);
            color: var(--label-primary);
            letter-spacing: -0.01em;
        }
        .name-input-box::placeholder { color: var(--label-tertiary); font-weight: 400; }
        .name-input-box:focus {
            background: rgba(118, 118, 128, 0.18);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.22);
        }
        .name-input-box.shake-error {
            animation: shakeX 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97);
            box-shadow: 0 0 0 3px rgba(255, 45, 85, 0.32), 0 0 22px rgba(255, 45, 85, 0.25);
            background: rgba(255, 45, 85, 0.08);
        }
        @keyframes shakeX {
            10%, 90% { transform: translateX(-2px); }
            20%, 80% { transform: translateX(3px); }
            30%, 50%, 70% { transform: translateX(-6px); }
            40%, 60% { transform: translateX(6px); }
        }
        /* 姓名必填小提示（紅色脈衝點） */
        .name-required-hint {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--apple-pink);
            font-weight: 600;
            margin-left: 6px;
            transition: opacity 0.3s;
        }
        .name-required-hint::before {
            content: "";
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--apple-pink);
            animation: dotPulse 1.6s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.55; }
        }
        /* 貼紙按鈕：未填名字時鎖定 */
        .sticker-btn.is-locked {
            opacity: 0.4;
            filter: grayscale(0.6);
            cursor: not-allowed;
        }
        .sticker-btn.is-locked:hover {
            transform: none !important;
            box-shadow: none !important;
        }

        .image-box {
            width: 100%;
            aspect-ratio: 16 / 9;            /* 配合主視覺實際比例 */
            border-radius: 18px;
            margin-bottom: 18px;
            overflow: hidden;
            background: linear-gradient(135deg, #fce7f3, #ede9fe);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow:
                0 1px 2px rgba(0, 0, 0, 0.04),
                0 8px 24px rgba(0, 0, 0, 0.06);
        }
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;               /* 填滿邊框，不留白邊 */
            animation: imgFade 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }
        @keyframes imgFade {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .quiz-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--apple-blue);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: opacity 0.2s;
            visibility: hidden;
            letter-spacing: -0.01em;
        }
        .back-btn:hover { opacity: 0.6; }
        .back-btn:active { opacity: 0.4; }

        .progress-wrap { margin-bottom: 18px; }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .progress-meta .progress-label { color: var(--label-tertiary); }
        .progress-meta .progress-percent {
            color: var(--apple-blue);
            font-variant-numeric: tabular-nums;
            font-size: 12px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(118, 118, 128, 0.16);
            border-radius: 50px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar-fg {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--apple-blue), var(--apple-indigo), var(--apple-purple));
            background-size: 200% 100%;
            border-radius: 50px;
            transition: width 0.6s cubic-bezier(0.32, 0.72, 0, 1);
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }
        .progress-dots {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding: 0 1px;
        }
        .progress-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(118, 118, 128, 0.24);
            transition: all 0.45s cubic-bezier(0.32, 0.72, 0, 1.4);
        }
        .progress-dot.done {
            background: var(--apple-blue);
            transform: scale(1.3);
        }
        .progress-dot.current {
            background: var(--apple-indigo);
            transform: scale(1.7);
            box-shadow: 0 0 0 4px rgba(88, 86, 214, 0.18);
            animation: pulse 1.6s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 4px rgba(88, 86, 214, 0.18); }
            50% { box-shadow: 0 0 0 8px rgba(88, 86, 214, 0.06); }
        }

        .identity-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin: 10px 0;
            padding: 18px 14px;
            background: rgba(118, 118, 128, 0.08);
            border-radius: 18px;
        }

        .sticker-btn {
            padding: 12px 22px;
            border: 2.5px solid #ffffff;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
            letter-spacing: -0.005em;
        }

        .silver { background: linear-gradient(135deg, #f1f5f9, #cbd5e1); color: #334155; transform: rotate(-2.5deg); box-shadow: 2px 3px 0px #94a3b8, 2px 6px 14px rgba(0,0,0,0.08); }
        .gold { background: linear-gradient(135deg, #fffbeb, #fef08a); color: #713f12; transform: rotate(2deg); box-shadow: -2px 3px 0px #d97706, -2px 6px 14px rgba(0,0,0,0.08); }
        .purple { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); color: #5b21b6; transform: rotate(-1.5deg); box-shadow: 2px 2px 0px #7c3aed, 3px 6px 14px rgba(0,0,0,0.08); }

        .sticker-btn:hover { transform: scale(1.06) rotate(0deg) translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.12); z-index: 10; }
        .sticker-btn:active { transform: scale(0.95); }

        .question-title {
            font-size: 20px;
            font-weight: 700;
            margin-top: 4px;
            margin-bottom: 18px;
            color: var(--label-primary);
            line-height: 1.3;
            text-align: left;
            letter-spacing: -0.02em;
        }

        .options-container { display: flex; flex-direction: column; gap: 11px; }

        .option-btn {
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(60, 60, 67, 0.10);
            padding: 16px 20px 16px 44px;
            border-radius: 16px;
            text-align: left;
            font-size: 16px;
            font-weight: 500;
            color: var(--label-primary);
            cursor: pointer;
            transition: all 0.28s cubic-bezier(0.32, 0.72, 0, 1);
            position: relative;
            line-height: 1.35;
            letter-spacing: -0.01em;
            backdrop-filter: blur(10px);
            font-family: inherit;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        /* 左側小圓 indicator */
        .option-btn::before {
            content: "";
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1.5px solid rgba(60, 60, 67, 0.28);
            background: #fff;
            transition: all 0.28s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .option-btn:hover { 
            background: rgba(255, 255, 255, 0.96);
            border-color: rgba(0, 122, 255, 0.35);
            transform: translateY(-1.5px);
            box-shadow: 0 10px 22px rgba(0, 122, 255, 0.10), 0 1px 2px rgba(0,0,0,0.04);
        }
        .option-btn:hover::before { border-color: var(--apple-blue); }
        .option-btn:active { transform: scale(0.985); }
        .option-btn.selected {
            background: linear-gradient(135deg, rgba(0, 122, 255, 0.10), rgba(88, 86, 214, 0.12));
            border-color: var(--apple-blue);
            color: var(--label-primary);
            box-shadow: 0 6px 22px rgba(0, 122, 255, 0.18), 0 0 0 3px rgba(0, 122, 255, 0.10);
            animation: selectPulse 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding-right: 90px;        /* 預留貼紙空間 */
        }
        .option-btn.selected::before {
            background: var(--apple-blue);
            border-color: var(--apple-blue);
            box-shadow: inset 0 0 0 3px #fff;
        }
        @keyframes selectPulse {
            0% { transform: scale(1); }
            40% { transform: scale(1.025); }
            100% { transform: scale(1); }
        }

        .option-btn.selected::after {
            content: '✓ 已貼上';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--sticker-color);
            color: var(--sticker-text, #fff);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 0;
            animation: stamp 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes stamp {
            0% { transform: translateY(-50%) scale(3) rotate(-15deg); opacity: 0; filter: blur(2px); }
            60% { transform: translateY(-50%) scale(1.15) rotate(3deg); opacity: 1; filter: blur(0); }
            100% { transform: translateY(-50%) scale(1) rotate(0deg); opacity: 1; filter: blur(0); }
        }

        .confetti {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 14px;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
        }

        /* =========================================================
                  /* =========================================================
           📁 機密檔案風格結算卡（情報局特務風）
           ========================================================= */
        .profile-card {
            background: #ffffff;
            border: 2px solid #000000;
            border-radius: 0px; /* 檔案風走硬朗直角 */
            padding: 20px 16px;
            margin-top: 12px;
            text-align: left;
            position: relative;
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang TC", "Microsoft JhengHei", sans-serif;
            animation: cardPop 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 頂部黑底機密條 */
        .report-top-bar {
            background: #000000;
            color: #ffffff;
            padding: 6px 12px;
            font-size: 10px;
            font-weight: 700;
            font-family: 'SF Mono', Menlo, monospace;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.06em;
            margin-bottom: 16px;
        }
        .report-top-bar .dot-secret::before {
            content: "●";
            color: #ff2d55;
            margin-right: 6px;
        }

        /* 主標題區 */
        .report-header {
            border-bottom: 2px solid #000000;
            padding-bottom: 10px;
            margin-bottom: 14px;
            position: relative;
        }
        .report-subtitle {
            font-size: 11px;
            font-weight: 800;
            color: #555555;
            letter-spacing: 0.08em;
            font-family: 'SF Mono', Menlo, monospace;
            margin: 0 0 2px 0;
        }
        .report-title {
            font-size: 24px;
            font-weight: 900;
            color: #000000;
            margin: 0;
            letter-spacing: -0.01em;
        }
        /* 紅色「極機密」印章 */
                .stamp-top-secret {
            position: absolute;
            top: 16px;
            right: 16px;
            border: 3px solid #dc3545; /* 稍微加粗邊框 */
            color: #dc3545;
            padding: 6px 16px; /* 增加內邊距 */
            font-size: 22px; /* 字體從原本的 16px-18px 放大到 22px */
            font-weight: 900;
            text-transform: uppercase;
            transform: rotate(8deg);
            opacity: 0.85;
            letter-spacing: 3px; /* 增加字距讓它更有蓋章感 */
            border-radius: 4px;
        }


        /* 上方資訊欄：左大頭貼、右表格 */
        .report-meta-row {
            display: flex;
            gap: 16px;
            margin-bottom: 18px;
        }
        /* 左：相片區 */
        .report-photo-box {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .report-photo {
            width: 100%;
            aspect-ratio: 3 / 4;
            border: 1px solid #000000;
            background: var(--hero-bg, #f2f2f7);
            position: relative;
            padding: 8px;
        }
        /* 模擬相片角落的 L 型裁切線 */
        .report-photo::before, .report-photo::after {
            content: "";
            position: absolute;
            width: 10px; height: 10px;
            border-color: #000000;
            border-style: solid;
            pointer-events: none;
        }
        .report-photo::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
        .report-photo::after { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }
        
        .report-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
           .report-biometric {
            margin-top: 1px;
            display: flex;
            align-items: center;
            justify-content: center; /* 恢復置中 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif; /* 改為黑體 */
            font-size: 25 px; /* 保持放大後的清晰字體 */
            font-weight: 900; /* 特粗體 */
            color: #000000; /* 純黑色 */
            border: 1px solid #000000; /* 刪掉外框 */
            padding: 4px 0;
            background: transparent; /* 刪掉背景色 */
        }




              /* 修正後的經典表格：左欄全面套用灰底 */
        .report-table {
            flex: 1;
            border-collapse: collapse;
            width: 100%;
            font-size: 12.5px;
        }
        .report-table td {
            border: 1px solid #000000;
            padding: 8px 10px;
            vertical-align: middle;
        }
        /* 表格左半邊（審查項目、核心屬性等）全面灰底 */
                .report-table td:first-child {
            width: 90px; /* 固定左欄寬度，防止「主要出沒地」擠壓換行 */
            white-space: nowrap; /* 強制文字不換行 */
            background: #f5f5f7;
            font-weight: 700;
            color: #333333;
            width: 32%;
            text-align: center;
        }
        .report-table .td-val {
            font-weight: 700;
            color: #000000;
        }
        /* 危險等級進度條 */
        .danger-bar-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .danger-bar-bg {
            flex: 1;
            height: 6px;
            background: #e5e5ea;
            border-radius: 2px;
            overflow: hidden;
        }
        .danger-bar-fg {
            height: 100%;
            background: #ff2d55;
        }

        /* 區段標題（SECTION 02 刪除了括號中文） */
        .section-divider {
            font-size: 9px;
            font-weight: 800;
            color: #666666;
            font-family: 'SF Mono', Menlo, monospace;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #000000;
            padding-bottom: 4px;
            margin: 18px 0 10px 0;
            text-transform: uppercase;
        }


        /* 診斷內文區 */
        .report-text-block {
            font-size: 13.5px;
            line-height: 1.6;
            color: #111111;
            text-align: justify;
            position: relative;
        }
        /* 內文姓名高亮 */
        .highlight-name {
            background: #fef08a; /* 螢光黃底色高亮 */
            font-weight: 800;
            padding: 1px 4px;
        }
       
        /* 監聽對話紀錄區 */
        .quote-log-box {
            background: #f8f9fa;
            border: 1px solid #e5e5ea;
            padding: 10px 12px;
            margin-top: 12px;
            font-size: 12px;
        }
        .quote-log-label {
            font-size: 9px;
            font-weight: 700;
            color: #8e8e93;
            font-family: 'SF Mono', Menlo, monospace;
            margin-bottom: 2px;
        }
        .quote-log-content {
            font-size:16px;
            font-weight: 900;
            line-height: 1.5;
            font-style: italic; /* 讓對話維持斜體更有紀錄感 */
            color: #111;
        }

        /* 衍生特徵因子標籤 */
        .report-tags-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .report-tag-item {

            let textColor = '#fff';
            if (type === 'silver') { root.style.setProperty('--sticker-color', '#cbd5e0'); textColor = '#4a5568'; }
            else if (type === 'gold') { root.style.setProperty('--sticker-color', '#ecc94b'); textColor = '#744210'; }
            else if (type === 'purple') { root.style.setProperty('--sticker-color', '#9f7aea'); textColor = '#ffffff'; }
            root.style.setProperty('--sticker-text', textColor);

            document.getElementById('start-page').className = 'hidden';
            document.getElementById('quiz-page').className = '';
            this.buildProgressDots();
            this.showQuestion();
        },

        // 監聽姓名輸入，動態切換貼紙按鈕的可按狀態
        refreshNameGate: function() {
            const input = document.getElementById('user-name-input');
            const hasName = !!input.value.trim();
            document.querySelectorAll('.sticker-btn').forEach(b => {
                b.classList.toggle('is-locked', !hasName);
            });
            const hint = document.getElementById('name-required-hint');
            if(hint) hint.style.opacity = hasName ? '0' : '1';
        },

        buildProgressDots: function() {
            const dotsBox = document.getElementById('progress-dots');
            dotsBox.innerHTML = '';
            for(let i = 0; i < questions.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                dotsBox.appendChild(dot);
            }
        },

        updateProgress: function() {
            const total = questions.length;
            const current = this.currentQuestionIndex;
            const percent = Math.round((current / total) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percent').innerText = percent + '%';
            document.getElementById('progress-text').innerText = `QUESTION ${current + 1} / ${total}`;
            
            const labels = ['開始作答', '繼續加油', '已過半囉', '快完成了', '最後一題'];
            document.getElementById('progress-label').innerText = labels[Math.min(current, labels.length - 1)];

            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((d, i) => {
                d.classList.remove('done', 'current');
                if(i < current) d.classList.add('done');
                else if(i === current) d.classList.add('current');
            });
        },

        showQuestion: function() {
            if (this.currentQuestionIndex >= questions.length) {
                this.showResult();
                return;
            }

            const backBtn = document.getElementById('back-btn');
            if(this.currentQuestionIndex > 0) {
                backBtn.style.visibility = 'visible';
            } else {
                backBtn.style.visibility = 'hidden';
            }

            const q = questions[this.currentQuestionIndex];
            this.updateProgress();
            document.getElementById('question-text').innerText = q.title;
            
            ImageEngine.setQuestionImage(this.currentQuestionIndex);

            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.style.animation = `pageSlide 0.4s cubic-bezier(0.32, 0.72, 0, 1) ${0.1 + idx * 0.08}s backwards`;
                btn.onclick = () => this.selectOption(btn, opt.score);
                optionsBox.appendChild(btn);
            });
        },

        selectOption: function(element, score) {
            element.classList.add('selected');
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.style.pointerEvents = 'none');

            this.selectedScores.push(score);
            this.currentQuestionIndex++;

            const percent = Math.round((this.currentQuestionIndex / questions.length) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percent').innerText = percent + '%';

            setTimeout(() => {
                this.showQuestion();
            }, 480); 
        },

        prevQuestion: function() {
            if(this.currentQuestionIndex > 0) {
                this.currentQuestionIndex--;
                this.selectedScores.pop(); 
                this.showQuestion();
            }
        },

        showResult: function() {
            document.getElementById('quiz-page').className = 'hidden';
            document.getElementById('result-page').className = '';

            const counts = {};
            let maxScore = "B";
            let maxCount = 0;

            this.selectedScores.forEach(score => {
                counts[score] = (counts[score] || 0) + 1;
                if (counts[score] > maxCount) { maxCount = counts[score]; maxScore = score; }
            });

            const finalResult = window.quizResultsDatabase[maxScore];
            
            document.getElementById('result-header-text').innerText = `▸ 偵測 ${this.userName}的大數據精密分析：`;

            const cardBox = document.getElementById('profile-card-box');

                        // 此段請直接蓋掉原先 showResult 裡的 cardBox.innerHTML 賦值區塊：
                        // 請用這段完全覆蓋 showResult 裡的 cardBox.innerHTML 區塊：
                        // 根據動物原本的 bg 顏色（例如 #FFD700 等），動態生成一個 12% 透明度的淺色背景供欄位與標籤使用
            const lightThemeBg = `${finalResult.bg}50`; // 這裡維持給 Hashtag 用（20 代表 12% 透明度）
            const tableLeftBg = `${finalResult.bg}40`;  // 這裡專門給「表格左欄」用（把 40 改大就會變深，改小就會變淺！）


            cardBox.innerHTML = `
                <div class="report-top-bar">
                    <div class="dot-secret">TOP SECRET // CLASS-2026</div>
                    <div>DOC-ID: ${finalResult.meta.code}</div>
                </div>
                
                <div class="report-header">
                    <div class="report-subtitle">HSINCHU CHIEN-KUNG INTELLIGENCE</div>
                    <h2 class="report-title"><span>${finalResult.name}</span></h2>
                    <div class="stamp-top-secret">極機密</div>
                </div>

                <div class="report-meta-row">
                    <div class="report-photo-box">
                        <div class="report-photo" style="--hero-bg:${finalResult.bg};">
                            <img src="${finalResult.characterName}.jpeg" onerror="this.onerror=null; this.src='${finalResult.characterName}.jpg'; this.onerror=function(){ this.onerror=null; this.src='${finalResult.characterName}.png'; this.onerror=function(){ this.style.display='none'; }; };" alt="${finalResult.name}">
                        </div>
                        <div class="report-biometric">
                            ${this.userName}
                        </div>
                    </div>
                    
                                        <table class="report-table">
                        <tr>
                            <td style="background-color: ${tableLeftBg} !important; font-weight: bold; color: #222; background-image: none !important;">審查項目</td>
                            <td class="td-val">鑑定機關觀測紀錄</td>
                        </tr>
                        <tr>
                            <td style="background-color: ${tableLeftBg} !important; font-weight: bold; color: #222;">觀測代號</td>
                            <td class="td-val" style="font-family:'SF Mono',monospace; font-size:11px;">${finalResult.meta.code}</td>
                        </tr>
                        <tr>
                            <td style="background-color: ${tableLeftBg} !important; font-weight: bold; color: #222;">危險等級</td>
                            <td class="td-val">
                                <div class="danger-bar-container">
                                    <div class="danger-bar-bg">
                                        <div class="danger-bar-fg" style="width: ${finalResult.meta.danger}; background-color: ${finalResult.bg};"></div>
                                    </div>
                                    <span style="font-family:'SF Mono',monospace; width:32px; text-align:right;">${finalResult.meta.danger}</span>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td style="background-color: ${tableLeftBg} !important; font-weight: bold; color: #222;">核心屬性</td>
                            <td class="td-val">${finalResult.badge}</td>
                        </tr>
                        <tr>
                            <td style="background-color: ${tableLeftBg} !important; font-weight: bold; color: #222;">主型態</td>
                            <td class="td-val">${finalResult.meta.type}</td>
                        </tr>
                        <tr>
                            <td style="background-color: ${tableLeftBg} !important; font-weight: bold; color: #222; font-size: 11px;">主要出沒地</td>
                            <td class="td-val" style="font-size:11px; line-height:1.2;">${finalResult.meta.place}</td>
                        </tr>
                    </table>

                </div>

                <div class="section-divider">SECTION 01 // BEHAVIORAL DIAGNOSIS </div>
                <div class="report-text-block">
                    經過 2026 建功大數據與行為軌跡追蹤，對象個體 <span class="highlight-name">${this.userName}</span> 在校園生態系中展現出極為顯著的 <span class="highlight-name">${finalResult.name}</span> 特徵。${finalResult.desc}
                    
                    <div class="quote-log-box">
                        <div class="quote-log-content">「${finalResult.quote}」</div>
                    </div>
                </div>

                <div class="section-divider">SECTION 02 // SUB-TRAITS</div>
                <div class="report-tags-grid">
                    ${finalResult.traits.map(t => `<span class="report-tag-item" style="background-color: ${lightThemeBg}; border-color: ${finalResult.bg}; color: #111; font-weight: 600;">${t}</span>`).join('')}
                </div>

                <div class="report-footer">
                    <div class="report-footer-meta">
                        CLASSIFIED BY: 2026 CKHS GRADUATION COMMITTEE<br>
                        DATE OF ISSUED: 2026.06 // AUTHORIZED UNDER STATUTE 63
                    </div>
                    <div class="stamp-red-seal">
                        建功高中<br>畢聯會<br><span style="font-family:'SF Mono',monospace; font-size:7px; margin-top:2px;">2026</span>
                    </div>
                </div>
                <div class="export-only" id="export-watermark"></div>
            `;



            // 把卡片底色變數設給卡片本體，供 IG 模式背景使用
            cardBox.style.setProperty('--hero-bg', finalResult.bg);

            setTimeout(fireConfetti, 200);
        },

        // 🌟 匯出為 IG 限動 9:16 高畫質 PNG (1080×1920)
        // 流程：html2canvas → toBlob → 試 Web Share API (iOS 會跳「儲存影像」) → 失敗就下載 PNG
        exportToImage: async function() {
            const targetNode = document.getElementById('profile-card-box');
            const btn = document.getElementById('export-btn-ig');
            if(!targetNode || !window.html2canvas) {
                showToast('匯出工具尚未載入，請稍候');
                return;
            }

            btn.disabled = true;
            const oldHtml = btn.innerHTML;
            btn.innerHTML = '<span class="btn-icon">⏳</span><span class="btn-text">正在生成...</span>';
            showToast('📱 正在生成高畫質報告...', 4000);

            // 加上匯出時專屬浮水印
            const watermark = document.getElementById('export-watermark');
            if(watermark) {
                watermark.innerHTML = `
                    <div style="font-weight: 600; color: rgba(60, 60, 67, 0.7); margin-bottom: 2px;">${this.userName} 的專屬畢業鑑定報告</div>
                `;
            }

            targetNode.classList.add('exporting', 'ig-story');

            // 等動畫穩定 + 所有圖片載入完
            await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
            const allImgs = targetNode.querySelectorAll('img');
            await Promise.all(Array.from(allImgs).map(img => {
                if(img.complete && img.naturalWidth > 0) return Promise.resolve();
                return new Promise(r => {
                    const done = () => r();
                    img.addEventListener('load', done, { once: true });
                    img.addEventListener('error', done, { once: true });
                    setTimeout(done, 2500);
                });
            }));

            try {
                const canvas = await html2canvas(targetNode, {
                    scale: 2,                              // 540×2 = 1080（IG 限動標準）
                    backgroundColor: '#FFFFFF',
                    useCORS: true,
                    allowTaint: true,
                    logging: false,
                    imageTimeout: 5000,
                    width: 540,
                    height: 960,
                    windowWidth: 540,
                    windowHeight: 960,
                    onclone: (clonedDoc) => {
                        const card = clonedDoc.getElementById('profile-card-box');
                        if(card) {
                            card.style.animation = 'none';
                            card.style.transform = 'none';
                            card.style.boxShadow = 'none';
                            card.style.margin = '0';
                            card.querySelectorAll('*').forEach(el => {
                                el.style.animation = 'none';
                                el.style.transition = 'none';
                            });
                        }
                    }
                });

                // 先轉成 Blob 以便走 Web Share API
                const blob = await new Promise((resolve, reject) => {
                    canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob failed')), 'image/png', 1.0);
                });
                const fileName = `${this.userName}_建功畢業鑑定報告.png`;
                const file = new File([blob], fileName, { type: 'image/png' });

                // 嘗試 Web Share API（行動裝置原生分享：iOS 可選「儲存影像」直入相簿）
                let shared = false;
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: '我的建功畢業鑑定報告',
                            text: `${this.userName} 的 2026 建功畢業鑑定報告 ✨`
                        });
                        shared = true;
                        showToast('✅ 分享完成！', 2000);
                    } catch (shareErr) {
                        // 使用者按取消也會丟錯，這時不 fallback（避免又下載一次）
                        if (shareErr && shareErr.name === 'AbortError') {
                            shared = true;     // 視為已處理
                            showToast('已取消', 1500);
                        } else {
                            console.warn('Web Share 失敗，fallback 到下載:', shareErr);
                        }
                    }
                }

                // Fallback：下載 PNG（手機 Safari 長按可儲存至相簿，桌面則直接下載）
                if (!shared) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 1000);
                    showToast('✅ 已下載！手機可長按圖片儲存至相簿', 3000);
                }
            } catch (err) {
                console.error('匯出失敗:', err);
                showToast('⚠️ 匯出失敗，請再試一次', 2500);
            } finally {
                targetNode.classList.remove('exporting', 'ig-story');
                btn.disabled = false;
                btn.innerHTML = oldHtml;
            }
        },

        resetQuiz: function() {
            this.currentQuestionIndex = 0;
            this.selectedScores = [];
            document.getElementById('result-page').className = 'hidden';
            document.getElementById('quiz-page').className = 'hidden';
            document.getElementById('start-page').className = '';
            ImageEngine.setWelcomeImage();
        }
    };

    window.onload = function() {
        ImageEngine.setWelcomeImage();
    };
})();
</script>
