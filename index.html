<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 建功人請回答！！畢業限定心理測驗</title>
    <style>
        /* ==============================
           🎨 設計系統與現代紀念牆配色
           ============================== */
        :root {
            --primary-color: #4a5568;
            --bg-color-fallback: #f1f5f9; 
            --card-bg: rgba(255, 255, 255, 0.96); 
            --sticker-color: #cbd5e0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: '-apple-system', 'PingFang TC', 'SF Pro TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color-fallback);
            background-image: url('背景.jpeg'), url('背景.jpg'), url('背景.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 12px; /* 📱 縮小外邊距適應手機 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.4;
        }

        #quiz-container {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
        }

        /* 📱 緊湊優化：縮減 Padding 與間距，防止手機畫面過長 */
        .container {
            max-width: 440px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.1);
            padding: 20px 16px; /* 🌟 縮減上下內距 */
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
        }

        h1 {
            color: #0f172a;
            font-size: 21px;
            font-weight: 900;
            margin-top: 2px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 18px;
            text-align: justify;
        }

        .hidden {
            display: none !important;
        }

        /* ─── 🖼️ 圖片外框手機優化 ─── */
        .image-box {
            width: 100%;
            height: 140px; /* 🌟 縮小插圖高度，騰出垂直空間 */
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, 0.8);
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        .name-input-box {
            width: 100%;
            padding: 11px 14px;
            font-size: 15px;
            font-weight: 600;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            margin-bottom: 14px;
            text-align: center;
            outline: none;
            background: #f8fafc;
        }

        /* ─── 🔙 上一頁頂部列 ─── */
        .quiz-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .back-btn {
            background: none; border: none; color: #4f46e5;
            font-size: 13px; font-weight: 700; cursor: pointer;
            padding: 4px 0; display: flex; align-items: center; gap: 4px;
            visibility: hidden;
        }

        .identity-container {
            display: flex; flex-direction: column; gap: 10px;
            margin: 10px 0; padding: 14px;
            background: rgba(248, 250, 252, 0.6); border-radius: 14px; border: 2px dashed #cbd5e1;
        }

        .sticker-btn {
            padding: 11px 20px; border: 2px solid #ffffff; border-radius: 10px;
            font-weight: 800; font-size: 14.5px; cursor: pointer;
            transition: all 0.2s ease; text-align: center;
        }
        .silver { background: linear-gradient(135deg, #f1f5f9, #cbd5e1); color: #334155; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .gold { background: linear-gradient(135deg, #fffbeb, #fef08a); color: #713f12; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .purple { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); color: #5b21b6; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .question-title {
            font-size: 17px; font-weight: 800; margin-bottom: 16px;
            color: #0f172a; line-height: 1.4; text-align: left;
        }

        .options-container { display: flex; flex-direction: column; gap: 10px; }

        .option-btn {
            background: #f8fafc; border: 2px solid #edf2f7; padding: 14px 16px;
            border-radius: 12px; text-align: left; font-size: 14.5px; font-weight: 600;
            color: #334155; cursor: pointer; position: relative; line-height: 1.3;
        }

        .option-btn.selected::after {
            content: '✓ 已貼上'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: var(--sticker-color); color: var(--sticker-text, #fff);
            padding: 5px 10px; border-radius: 50px; font-size: 11px; font-weight: bold;
        }

        /* ─── 🏆 畢業結果卡片手機緊湊優化 ─── */
        .profile-card {
            background: #ffffff; border: 2px solid #0f172a; border-radius: 16px;
            padding: 16px 14px; margin-top: 10px; text-align: left;
            position: relative; box-shadow: 4px 4px 0px #0f172a;
        }

        .profile-header {
            border-bottom: 2px dashed #cbd5e1; padding-bottom: 10px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }

        .profile-avatar-box {
            width: 64px; height: 64px; border-radius: 10px; border: 2px solid #0f172a;
            overflow: hidden; background: #f8fafc; flex-shrink: 0; box-shadow: 1.5px 1.5px 0px #0f172a;
        }
        .profile-avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .profile-badge { font-size: 10px; background: #0f172a; color: #fff; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-bottom: 4px; }
        .profile-name { font-size: 18px; font-weight: 800; color: #0f172a; margin: 0; }

        .profile-meta {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px;
            background: #f8fafc; padding: 10px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #edf2f7;
        }
        .meta-item { line-height: 1.4; }
        .meta-label { font-weight: bold; color: #64748b; display: block; margin-bottom: 1px; }
        .meta-val { color: #334155; font-weight: 700; }

        @media (max-width: 440px) { .profile-meta { grid-template-columns: 1fr; gap: 6px; } }

        .profile-body { font-size: 13.5px; line-height: 1.6; color: #334155; text-align: justify; }
        .profile-quote { background: #f1f5f9; border-left: 4px solid #475569; padding: 10px 12px; font-style: italic; font-weight: 700; margin-top: 12px; border-radius: 0 8px 8px 0; font-size: 13px; color: #1e293b; }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .trait-tag { font-size: 11px; padding: 3px 10px; border-radius: 50px; font-weight: bold; border: 1px solid #0f172a; box-shadow: 1px 1px 0px #0f172a; color: #0f172a; }

        .action-box { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
        .action-btn { border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-size: 14.5px; font-weight: bold; width: 100%; }
        .export-btn { background: linear-gradient(45deg, #10b981, #059669); color: white; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.15); }
        .restart-btn { background: #0f172a; color: white; }

        footer { margin-top: 20px; font-size: 10.5px; color: #94a3b8; font-weight: 500; }
    </style>
</head>
<body>

    <div id="quiz-container">
        <div class="container">
            
            <div id="start-page">
                <h1>2026 建功人請回答！！</h1>
                <div class="image-box">
                    <img id="welcome-img" src="主視覺.jpeg" alt="建功心測主視覺">
                </div>
                <p class="subtitle">
                    這個測驗是畢聯會為建功人設計的，快來看看你在建功動物城是什麼角色吧！希望大家可以透過一些小問題面對更真實的自己~~
                </p>
                
                <p style="font-size: 13.5px; font-weight: bold; color: #334155; margin-bottom: 6px;">填入你的畢業大名 / 暱稱：</p>
                <input type="text" id="user-name-input" class="name-input-box" placeholder="例如：萬年班長小明 (限8字)" maxlength="8">

                <p style="font-size: 13.5px; font-weight: bold; color: #334155; margin-bottom: 5px;">撕下一張你的專屬貼紙身分：</p>
                <div class="identity-container">
                    <button class="sticker-btn silver" onclick="window.jgQuiz.selectIdentity('silver')">國中生</button>
                    <button class="sticker-btn gold" onclick="window.jgQuiz.selectIdentity('gold')">高中生</button>
                    <button class="sticker-btn purple" onclick="window.jgQuiz.selectIdentity('purple')">家長及外賓</button>
                </div>
            </div>

            <div id="quiz-page" class="hidden">
                <div class="quiz-top-bar">
                    <button id="back-btn" class="back-btn" onclick="window.jgQuiz.prevQuestion()">← 上一頁</button>
                    <div id="progress" style="font-size: 11px; color: #94a3b8; font-weight: bold; letter-spacing: 0.5px;"></div>
                </div>
                <div class="image-box">
                    <img id="quiz-img" src="" alt="問題插圖">
                </div>
                <div class="question-title" id="question-text"></div>
                <div class="options-container" id="options-box"></div>
            </div>

            <div id="result-page" class="hidden">
                <div id="result-header-text" style="font-size: 13px; font-weight: bold; color: #64748b; margin-bottom: 6px; text-align: left;"></div>
                <div class="profile-card" id="profile-card-box"></div>
                <div class="action-box">
                    <button class="action-btn export-btn" onclick="window.jgQuiz.exportToImage()">📸 儲存鑑定報告 (JPEG檔案)</button>
                    <button class="action-btn restart-btn" onclick="window.jgQuiz.resetQuiz()">重新建檔 / 再測一次</button>
                </div>
            </div>

            <footer>
                新竹市立建功高級中學 X 2026建功畢聯會
            </footer>
        </div>
    </div>

<script>
(function() {
    const questions = [
        { title: "明天要考試，今天晚上我會選擇...", options: [{ text: "#想辦法捲死同學", score: "A" }, { text: "#與周公約會", score: "B" }] },
        { title: "考前我更願意相信...", options: [{ text: "#自己的智商", score: "C" }, { text: "#神明一定會幫助我的", score: "D" }] },
        { title: "關於上學...", options: [{ text: "#上課有認真聽", score: "C" }, { text: "#有來學校就很棒了", score: "B" }] },
        { title: "下課時和好朋友兩個人在窗邊...", options: [{ text: "#高山流水遇知音", score: "A" }, { text: "#低山臭水遇噪音", score: "D" }] },
        { title: "面對未來的困難...", options: [{ text: "#放馬過來", score: "A" }, { text: "#放我一馬", score: "D" }] }
    ];

    window.quizResultsDatabase = {
        "A": { badge: "2026 頂峰執行者檔案", name: "蠻牛局長 × 風紀股長", characterName: "蠻牛局長", bg: "#fee2e2", meta: { code: "BOGO-BOSS-01", danger: "98%", place: "高三衝刺K書中心 / 糾察哨口", type: "鐵血行動派" }, traits: ["#放馬過來", "#想辦法捲死同學", "#氣場兩米八", "#高山流水遇知音"], desc: "你就是那個面對未知挑戰敢正面大喊「放馬過來」的絕對強者！在學校裡遇到競爭會瞬間激發滿滿的戰鬥力，實力上演捲死同學的戲碼。你目標明確、效率極高，擁有不可動搖的霸氣。畢業後絕對是社會上打破常規、開疆闢土的開路先鋒！", quote: "別擋路，我的目標只有頂峰。" },
        "B": { badge: "2026 活力夢想家檔案", name: "兔子茱蒂 × 體育股長", characterName: "兔子茱蒂", bg: "#fef9c3", meta: { code: "JUDY-SPORTS-26", danger: "15%", place: "操場跑道 / 體育器材室", type: "佛系熱血派" }, traits: ["#有來學校就很棒了", "#與周公約會", "#熱血滿點", "#元氣輸出"], desc: "你抱持著「有來學校就很棒了」的樂活達人態度，雖然昨晚可能還在跟周公進行深度約會，但點燃熱情的速度比誰都快！看似無害其實內心生命力爆棚。只要運動會或活動號角響起，你就是全班的動能核心！", quote: "生活要懂得放鬆，但好玩的事情我絕不缺席！" },
        "C": { badge: "2026 智商天花板檔案", name: "狐狸尼克 × 副班長", characterName: "狐狸尼克", bg: "#fae8ff", meta: { code: "NICK-VICE-99", danger: "65%", place: "後排靠窗座位 / 考前被包圍的課桌", type: "從容智謀派" }, traits: ["#自己的智商", "#上課有認真聽", "#智商擔當", "#優雅省力"], desc: "考前你絕對敢大膽貼上「相信自己智商」的標籤，因為你上課其實都有默默抓到核心重點，骨子裡自帶一種看透局勢的淡定。聰明、帶點讓人又愛又恨的小傲嬌，平時低調看戲、優雅省力，但大局需要時總能用高智商精準掌控，是班上的隱藏版大佬。", quote: "實力擺在那裡，穩紮穩打才是最高級的優雅。" },
        "D": { badge: "2026 校園守護神檔案", name: "樹懶快俠 × 普通學生", characterName: "樹懶快俠", bg: "#dcfce7", meta: { code: "FLASH-STUDENT-00", danger: "0%", place: "教室最後一排 / 合作社榕樹下", type: "療癒避風港" }, traits: ["#放我一馬", "#神明一定會幫助我的", "#低山臭水遇噪音", "#慢條斯理"], desc: "面對壓力重重的日常，你只想高喊「放我一馬」，考前默默祈禱神明加持。你不追求職位的虛名，只想當個與世無爭、置身事外的普通學生。即使身邊的人際關係像噪音一樣煩人，你也總能用強大的冷幽默和獨特的慢節奏將其化解，活得悠閒又療癒。", quote: "沒事沒事，平安畢業，順其自然。" }
    };

    const ImageEngine = {
        setQuestionImage: function(index) {
            const imgTag = document.getElementById('quiz-img');
            if(!imgTag) return;
            const qNum = index + 1;
            imgTag.src = `問題${qNum}.png`;
            imgTag.onerror = function() {
                this.onerror = function() {
                    this.onerror = function() { this.src = ''; };
                    this.src = `問題${qNum}.jpg`;
                };
                this.src = `問題${qNum}.jpeg`;
            };
        },
        setWelcomeImage: function() {
            const imgTag = document.getElementById('welcome-img');
            if(!imgTag) return;
            imgTag.src = '主視覺.jpeg';
            imgTag.onerror = function() {
                this.onerror = function() { this.src = '主視覺.png'; };
                this.src = '主視覺.jpg';
            };
        }
    };

    window.jgQuiz = {
        currentQuestionIndex: 0,
        selectedScores: [],
        userName: "建功人",

        selectIdentity: function(type) {
            const inputName = document.getElementById('user-name-input').value.trim();
            if(inputName) { this.userName = inputName; }

            const root = document.documentElement;
            let textColor = '#fff';
            if (type === 'silver') { root.style.setProperty('--sticker-color', '#cbd5e0'); textColor = '#4a5568'; }
            else if (type === 'gold') { root.style.setProperty('--sticker-color', '#ecc94b'); textColor = '#744210'; }
            else if (type === 'purple') { root.style.setProperty('--sticker-color', '#9f7aea'); textColor = '#ffffff'; }
            root.style.setProperty('--sticker-text', textColor);

            document.getElementById('start-page').className = 'hidden';
            document.getElementById('quiz-page').className = '';
            this.showQuestion();
        },

        showQuestion: function() {
            if (this.currentQuestionIndex >= questions.length) {
                this.showResult();
                return;
            }

            const backBtn = document.getElementById('back-btn');
            if(this.currentQuestionIndex > 0) {
                backBtn.style.visibility = 'visible';
            } else {
                backBtn.style.visibility = 'hidden';
            }

            const q = questions[this.currentQuestionIndex];
            document.getElementById('progress').innerText = `QUESTION ${this.currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('question-text').innerText = q.title;
            
            ImageEngine.setQuestionImage(this.currentQuestionIndex);

            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => this.selectOption(btn, opt.score);
                optionsBox.appendChild(btn);
            });
        },

        selectOption: function(element, score) {
            element.classList.add('selected');
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.style.pointerEvents = 'none');

            this.selectedScores.push(score);
            this.currentQuestionIndex++;

            setTimeout(() => {
                this.showQuestion();
            }, 350); 
        },

        prevQuestion: function() {
            if(this.currentQuestionIndex > 0) {
                this.currentQuestionIndex--;
                this.selectedScores.pop(); 
                this.showQuestion();
            }
        },

        showResult: function() {
            document.getElementById('quiz-page').className = 'hidden';
            document.getElementById('result-page').className = '';

            const counts = {};
            let maxScore = "B";
            let maxCount = 0;

            this.selectedScores.forEach(score => {
                counts[score] = (counts[score] || 0) + 1;
                if (counts[score] > maxCount) { maxCount = counts[score]; maxScore = score; }
            });

            const finalResult = window.quizResultsDatabase[maxScore];
            
            document.getElementById('result-header-text').innerText = `▸ 偵測 [${this.userName}] 的大數據精密 analysis：`;

            const cardBox = document.getElementById('profile-card-box');
            let traitHtml = '';
            finalResult.traits.forEach(t => {
                traitHtml += `<span class="trait-tag" style="background:${finalResult.bg}">${t}</span>`;
            });

            cardBox.innerHTML = `
                <div class="profile-header">
                    <div class="profile-title-area">
                        <span class="profile-badge">${finalResult.badge}</span>
                        <h2 class="profile-name">${finalResult.name}</h2>
                    </div>
                    <div class="profile-avatar-box">
                        <img src="${finalResult.characterName}.jpeg" onerror="this.onerror=null; this.src='${finalResult.characterName}.jpg'; this.onerror=function(){this.src='${finalResult.characterName}.png';};" alt="${finalResult.name}">
                    </div>
                </div>
                <div class="profile-meta">
                    <div class="meta-item"><span class="meta-label">安全編號</span><span class="meta-val">${finalResult.meta.code}</span></div>
                    <div class="meta-item"><span class="meta-label">特質歸屬</span><span class="meta-val">${finalResult.meta.type}</span></div>
                    <div class="meta-item"><span class="meta-label">危險系數</span><span class="meta-val">${finalResult.meta.danger}</span></div>
                    <div class="meta-item"><span class="meta-label">主要出沒</span><span class="meta-val">${finalResult.meta.place}</span></div>
                </div>
                <div class="profile-body">
                    ${finalResult.desc}
                </div>
                <div class="profile-quote">
                    「${finalResult.quote}」
                </div>
                <div style="font-size:11px; font-weight:bold; color:#64748b; margin-top:10px; margin-bottom:5px;">▸ 偵測解鎖貼紙標籤：</div>
                <div class="tags-container">
                    ${traitHtml}
                </div>
            `;
        },

        // 🌟 核心修正：大幅調深 Canvas 渲染色彩（高對比、鮮艷色調，防截圖過淡）
        exportToImage: function() {
            const targetNode = document.getElementById('profile-card-box');
            if(!targetNode) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = 540;
            canvas.height = 760;

            // 🎨 加深粉紫漸層背景，防止整體畫面發白
            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "#fbcfe8"); // 🌟 加深粉色 (Pink 300)
            gradient.addColorStop(1, "#e9d5ff"); // 🌟 加深紫色 (Purple 200)
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 內層硬派純白實色卡片（厚重感底層）
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(25, 25, canvas.width - 50, canvas.height - 50);
            ctx.lineWidth = 4; // 🌟 粗黑邊框
            ctx.strokeStyle = "#0f172a";
            ctx.strokeRect(25, 25, canvas.width - 50, canvas.height - 50);

            // 頂部大標題（使用最深黑色）
            ctx.fillStyle = "#0f172a";
            ctx.font = "bold 22px sans-serif";
            ctx.fillText(`⚡ ${this.userName} 的建功畢業生專屬檔案`, 50, 75);

            ctx.strokeStyle = "#94a3b8"; // 加深裁切虛線
            ctx.lineWidth = 2.5;
            ctx.setLineDash([8, 5]);
            ctx.beginPath(); ctx.moveTo(50, 105); ctx.lineTo(490, 105); ctx.stroke();
            ctx.setLineDash([]); 

            const pName = targetNode.querySelector('.profile-name')?.innerText || "";
            const pBadge = targetNode.querySelector('.profile-badge')?.innerText || "";
            const pBody = targetNode.querySelector('.profile-body')?.innerText || "";
            const pQuote = targetNode.querySelector('.profile-quote')?.innerText || "";

            // 徽章背景
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(50, 130, 140, 24);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 12px sans-serif";
            ctx.fillText(pBadge.replace(" 檔案", ""), 60, 146);
            
            // 角色大名
            ctx.fillStyle = "#0f172a";
            ctx.font = "max(26px, sans-serif) bold";
            ctx.font = "bold 28px sans-serif";
            ctx.fillText(pName, 50, 195);

            // 資料網格底座：加深底色為輕微水泥灰
            ctx.fillStyle = "#f1f5f9"; 
            ctx.fillRect(50, 220, 440, 115);
            ctx.strokeStyle = "#0f172a";
            ctx.lineWidth = 2.5; // 🌟 框線加粗
            ctx.strokeRect(50, 220, 440, 115);

            ctx.fillStyle = "#1e293b"; // 🌟 文字全面改為極深灰
            ctx.font = "bold 14px sans-serif";
            
            const metaVals = targetNode.querySelectorAll('.meta-val');
            const val1 = metaVals[0]?.innerText || "";
            const val2 = metaVals[1]?.innerText || "";
            const val3 = metaVals[2]?.innerText || "";
            const val4 = metaVals[3]?.innerText || "";

            ctx.fillText("📌 安全編號：" + val1, 65, 255);
            ctx.fillText("💀 危險系數：" + val3, 65, 295);
            ctx.fillText("🧬 特質歸屬：" + val2, 260, 255);
            
            // 處理出沒換行
            ctx.fillText("📍 主要出沒：", 260, 295);
            let pWord1 = val4.substring(0, 8);
            let pWord2 = val4.substring(8);
            ctx.fillText(pWord1, 345, 295);
            if(pWord2) { ctx.fillText(pWord2, 345, 315); }

            // 本文描述（加粗、加深）
            ctx.fillStyle = "#0f172a"; // 🌟 純黑字體，杜絕過淡問題
            ctx.font = "bold 15.5px sans-serif"; // 🌟 微加粗字體
            
            function wrapCanvasText(context, text, x, y, maxWidth, lineHeight) {
                let chunks = text.split('');
                let currentLine = '';
                for(let i = 0; i < chunks.length; i++) {
                    let test = currentLine + chunks[i];
                    if (context.measureText(test).width > maxWidth && i > 0) {
                        context.fillText(currentLine, x, y);
                        currentLine = chunks[i];
                        y += lineHeight;
                    } else { currentLine = test; }
                }
                context.fillText(currentLine, x, y);
                return y;
            }
            let textEndY = wrapCanvasText(ctx, pBody, 50, 375, 435, 25);

            // 語錄對話框底座（加深灰色底）
            ctx.fillStyle = "#e2e8f0";
            ctx.fillRect(50, textEndY + 20, 440, 48);
            ctx.fillStyle = "#0f172a";
            ctx.font = "italic bold 15px sans-serif"; // 🌟 字體加粗
            ctx.fillText(pQuote, 65, textEndY + 49);

            // 標籤貼紙效果模擬
            ctx.fillStyle = "#cbd5e1";
            ctx.font = "bold 12px sans-serif";
            ctx.fillText("▸ 解鎖貼紙：", 50, textEndY + 95);
            
            // 浮水印章（調深顏色）
            ctx.strokeStyle = "rgba(15, 23, 42, 0.25)"; // 🌟 提高印章透明度到 0.25
            ctx.lineWidth = 3.5;
            ctx.beginPath(); ctx.arc(440, textEndY + 120, 32, 0, 2 * Math.PI); ctx.stroke();
            ctx.fillStyle = "rgba(15, 23, 42, 0.25)";
            ctx.font = "bold 10px sans-serif";
            ctx.fillText("PASSED", 421, textEndY + 124);

            // 頁尾
            ctx.fillStyle = "#64748b";
            ctx.font = "bold 11px sans-serif";
            ctx.fillText("新竹市立建功高級中學 X 2026建功畢聯會 認證存檔", 50, 720);

            // 下載
            const dataURL = canvas.toDataURL('image/jpeg', 1.0); // 🌟 畫質拉滿到 1.0 最高畫質
            const downloadLink = document.createElement('a');
            downloadLink.href = dataURL;
            downloadLink.download = `${this.userName}_建功畢業鑑定報告.jpg`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        },

        resetQuiz: function() {
            this.currentQuestionIndex = 0;
            this.selectedScores = [];
            document.getElementById('result-page').className = 'hidden';
            document.getElementById('quiz-page').className = 'hidden';
            document.getElementById('start-page').className = '';
            ImageEngine.setWelcomeImage();
        }
    };

    window.onload = function() {
        ImageEngine.setWelcomeImage();
    };
})();
</script>

</body>
</html>
